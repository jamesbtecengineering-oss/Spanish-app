<html lang="es">

        * { box-sizing: border-box; -webkit-user-select: none; touch-action: manipulation; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: var(--bg); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; padding: 20px; }
        .active { display: flex; }
        
        .menu-card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 15px; overflow-y: auto; flex: 1; }
        h1 { text-align: center; color: var(--dark); margin: 0 0 10px 0; font-size: 1.4rem; font-weight: 900; }
        h2 { font-size: 0.9rem; text-align: center; color: #7f8c8d; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        
        label { display: block; font-size: 10px; font-weight: 900; color: var(--blue); margin-top: 15px; text-transform: uppercase; }
        select { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #eee; font-size: 16px; margin-top: 5px; background: #fff; appearance: none; }
        
        .btn-main { width: 100%; padding: 18px; border-radius: 15px; border: none; color: white; font-weight: 800; font-size: 18px; margin-top: 10px; box-shadow: 0 4px 0 rgba(0,0,0,0.1); }
        .btn-main:active { transform: translateY(2px); box-shadow: none; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: white; border-bottom: 1px solid #ddd; }
        .card-container { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; padding: 20px; }
        .card { width: 100%; height: 80%; background: white; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; border: 1px solid #eee; transition: transform 0.2s; }
        
        .card-text { font-size: 1.5rem; font-weight: 700; color: var(--dark); line-height: 1.4; }
        .card-sub { font-size: 10px; color: var(--gold); font-weight: 900; letter-spacing: 2px; margin-bottom: 15px; text-transform: uppercase; }

        .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; flex: 1; overflow-y: auto; padding-bottom: 20px; }
        .match-item { background: white; border: 2px solid #eee; border-radius: 12px; padding: 15px; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 13px; font-weight: 600; min-height: 80px; }
        .selected { border-color: var(--blue); background: #ebf5fb; }
        .correct { visibility: hidden; }

        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; padding: 20px; background: white; border-top: 1px solid #eee; }
        .btn-sm { border: none; padding: 16px; border-radius: 12px; color: white; font-weight: 800; font-size: 13px; }
    </style>
</head>
<body>

<div id="menu-screen" class="screen active">

    <h2>Full Curriculum A1.1 - B2.3</h2>
    <div class="menu-card">
        <label>Select Your Level</label>
        <select id="level">

                <option value="A1.2">A1.2 - Survival Needs</option>
                <option value="A1.3">A1.3 - Daily Routine</option>
            </optgroup>
            <optgroup label="Intermediate (A2)">
                <option value="A2.1">A2.1 - Socializing</option>
                <option value="A2.2">A2.2 - Past Events</option>
                <option value="A2.3">A2.3 - Future Plans</option>
            </optgroup>
            <optgroup label="Intermediate High (B1)">
                <option value="B1.1">B1.1 - Work & Camello</option>
                <option value="B1.2">B1.2 - Opinions & Debates</option>
                <option value="B1.3">B1.3 - Street Fluency</option>
            </optgroup>
            <optgroup label="Advanced (B2)">
                <option value="B2.1">B2.1 - Complex Logic</option>
                <option value="B2.2">B2.2 - Hypotheticals</option>
                <option value="B2.3">B2.3 - Idiomatic Mastery</option>
            </optgroup>
        </select>

        <label>Learning Mode</label>
        <select id="view">
            <option value="es">Spanish First (Recall)</option>
            <option value="en">English First (Translation)</option>
            <option value="random">Random Mix (Challenge)</option>
        </select>
    </div>
    <button class="btn-main" style="background:var(--blue);" onclick="initGame('flash')">Start Flashcards</button>
    <button class="btn-main" style="background:var(--win);" onclick="initGame('match')">Start Match Game</button>
</div>

<div id="flash-screen" class="screen" style="padding:0;">
    <div class="header">
        <button onclick="goMenu()" style="border:none; background:none; font-size:24px;">✕</button>
        <div id="status" style="font-weight: 900; color: #95a5a6; font-size: 14px;">0 LEFT</div>
        <button onclick="speak()" style="border:none; background:none; font-size:24px;">🔊</button>
    </div>
    <div class="card-container">
        <div id="main-card" class="card" onclick="flip()">
            <div id="card-type" class="card-sub">Spanish</div>
            <div id="card-content" class="card-text">Loading...</div>
        </div>
    </div>
    <div class="controls">
        <button class="btn-sm" style="background:var(--red)" onclick="handleSwipe('L')">RETRY</button>
        <button class="btn-sm" style="background:#7f8c8d" onclick="flip()">FLIP</button>
        <button class="btn-sm" style="background:var(--win)" onclick="handleSwipe('R')">MASTERED</button>
    </div>
</div>

<div id="match-screen" class="screen">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2 style="margin:0;">Match Game</h2>
        <button onclick="goMenu()" style="border:none; background:none; font-size:20px;">Exit</button>
    </div>
    <div id="match-grid" class="match-grid"></div>
</div>
