<html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blink Omni: 1000H Engine</title>
    <style>
        :root { 
            --gold: #fbbf24; --blue: #3b82f6; --green: #10b981; --red: #ef4444;
            --bg: #020617; --card: #1e293b; --text: #f8fafc; --accent: #8b5cf6; 
        }
        * { box-sizing: border-box; -webkit-user-select: none; touch-action: manipulation; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; padding: 20px; overflow-y: auto; }
        .active { display: flex; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* Progress Engine (Scale: 60,000 Minutes) */
        .prog-container { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .bar-bg { width: 100%; height: 10px; background: #000; border-radius: 5px; margin-top: 10px; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--blue)); width: 0%; transition: 2s ease-in-out; }
        
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #334155; }
        .stat-val { display: block; font-size: 20px; font-weight: 900; color: var(--gold); }

        /* Selection & Buttons */
        select, .btn { width: 100%; padding: 16px; background: var(--card); border: 1px solid #334155; border-radius: 12px; color: white; margin-bottom: 12px; font-size: 14px; outline: none; }
        .btn-run { background: var(--accent); font-weight: 800; border: none; cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.2); }
        .btn-run:active { transform: translateY(2px); box-shadow: none; }

        /* Flow Mode Elements */
        .game-main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .q-txt { font-size: 1.7rem; font-weight: 800; margin-bottom: 20px; line-height: 1.2; }
        .opt-grid { display: grid; grid-template-columns: 1fr; gap: 8px; width: 100%; }
        .opt-btn { background: var(--card); padding: 16px; border-radius: 12px; border: 1px solid #334155; color: white; font-weight: 600; }
        
        .drop-zone { min-height: 80px; width: 100%; border: 2px dashed #334155; border-radius: 16px; margin: 15px 0; display: flex; flex-wrap: wrap; gap: 8px; padding: 10px; justify-content: center; background: rgba(0,0,0,0.2); }
        .chip { background: var(--accent); padding: 10px 14px; border-radius: 8px; font-weight: 700; font-size: 13px; box-shadow: 0 2px 0 rgba(0,0,0,0.2); }
        
        .label { font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--blue); font-weight: 900; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<div id="scr-home" class="screen active">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h1 style="margin:0; font-size:24px; color:var(--accent);">BLINK OMNI</h1>
        <div id="rank" style="font-size:10px; font-weight:900; color:var(--gold); border:1px solid var(--gold); padding:4px 10px; border-radius:20px;">RECLUTA</div>
    </div>

    <div class="prog-container">
        <div style="display:flex; justify-content:space-between; font-size:11px; font-weight:800;">
            <span>TOTAL PROGRESS (1000 HOURS)</span>
            <span id="txt-prog">0 / 60,000 MIN</span>
        </div>
        <div class="bar-bg"><div id="fill-prog" class="bar-fill"></div></div>
    </div>

    <div class="stats">
        <div class="stat-card"><span id="val-xp" class="stat-val">0</span><span class="label">XP Points</span></div>
        <div class="stat-card"><span id="val-hr" class="stat-val">0.0</span><span class="label">Hours</span></div>
    </div>

    <label class="label">Select Level ($A1.1$ - $B2.3$)</label>
    <select id="sel-lvl">
        <optgroup label="Beginner Foundation">
            <option value="A1.1">A1.1: Core Verbs & Pronouns</option>
            <option value="A1.2">A1.2: Daily Living & Needs</option>
            <option value="A1.3">A1.3: Basic Directions</option>
        </optgroup>
        <optgroup label="Intermediate Mastery">
            <option value="A2.1">A2.1: Social Narratives</option>
            <option value="A2.3">A2.3: Expressing Needs</option>
            <option value="B1.1">B1.1: Debate & Opinion</option>
        </optgroup>
        <optgroup label="Advanced Professional">
            <option value="B2.1">B2.1: Workplace Spanish</option>
            <option value="B2.3">B2.3: Cultural Complexities</option>
        </optgroup>
    </select>

    <label class="label">Specialized Domain</label>
    <select id="sel-sub">
        <option value="general">General South American</option>
        <option value="street">Street Slang (CO, AR, PE)</option>
        <option value="medical">Medical & Wellness</option>
        <option value="business">Business & Finance</option>
        <option value="legal">Legal & Documentation</option>
        <option value="romance">Dating & Social Life</option>
    </select>

    <button class="btn btn-run" onclick="launchFlow()">START FLOW MODE</button>
</div>

<div id="scr-flow" class="screen">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <button onclick="saveAndExit()" style="background:none; border:none; color:white; font-size:32px;">✕</button>
        <div id="tag-mode" class="label" style="background:var(--accent); padding:5px 12px; border-radius:6px; color:white;">MODE</div>
        <button onclick="talk()" style="background:none; border:none; color:white; font-size:32px;">🔊</button>
    </div>
    <div id="flow-content" class="game-main"></div>
    <div id="flow-footer"></div>
</div>

<script>
// SCALABLE DATA ARCHITECTURE
const db = {
    "A1.1": {
        general: [{es:"Yo necesito ayuda", en:"I need help"},{es:"¿Dónde está?", en:"Where is it?"}],
        street: [{es:"¡Qué más, parce!", en:"What's up, friend!"}],
        medical: [{es:"Me duele la cabeza", en:"My head hurts"}]
    },
    "B2.3": {
        business: [{es:"El retorno de inversión", en:"The return on investment"}],
        legal: [{es:"Sin perjuicio de lo anterior", en:"Without prejudice to the foregoing"}],
        general: [{es:"Ojalá hubiera sabido", en:"I wish I had known"}]
    }
};

let user = { xp: 0, mins: 0, lastLvl: "A1.1" };
let deck = [], cur = null, sessionStart = null;

window.onload = () => {
    const saved = localStorage.getItem('blink_1000h_v2');
    if(saved) user = JSON.parse(saved);
    updateHome();
};

function launchFlow() {
    const l = document.getElementById('sel-lvl').value;
    const s = document.getElementById('sel-sub').value;
    const source = (db[l] && db[l][s]) ? db[l][s] : (db["A1.1"]["general"]);
    deck = [...source].sort(() => 0.5 - Math.random());
    sessionStart = Date.now();
    show('scr-flow');
    next();
}

function next() {
    user.xp += 25;
    cur = deck[Math.floor(Math.random()*deck.length)];
    const types = ["multi", "scramble", "audio", "flash"];
    render(types[Math.floor(Math.random()*types.length)]);
}

function render(t) {
    const main = document.getElementById('flow-content');
    const foot = document.getElementById('flow-footer');
    main.innerHTML = ''; foot.innerHTML = '';
    document.getElementById('tag-mode').innerText = t.toUpperCase();

    if(t === "scramble") {
        main.innerHTML = `<span class="label">Sentence Builder</span><div class="q-txt">${cur.en}</div><div class="drop-zone" id="drop"></div><div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;" id="pool"></div>`;
        cur.es.split(' ').sort(()=>0.5-Math.random()).forEach(w => {
            const c = document.createElement('div'); c.className='chip'; c.innerText=w;
            c.onclick = () => (c.parentElement === pool ? main.querySelector('#drop') : pool).appendChild(c);
            main.querySelector('#pool').appendChild(c);
        });
        foot.innerHTML = `<button class="btn btn-run" onclick="check()">VERIFY</button>`;
    } else if(t === "multi") {
        main.innerHTML = `<span class="label">Quick Translate</span><div class="q-txt">${cur.es}</div>`;
        const g = document.createElement('div'); g.className='opt-grid';
        [cur.en, "Incorrect Answer", "Wrong translation"].sort(()=>0.5-Math.random()).forEach(o => {
            const b = document.createElement('div'); b.className='opt-btn'; b.innerText=o;
            b.onclick = () => { if(o===cur.en) next(); else b.style.borderColor='var(--red)'; };
            g.appendChild(b);
        });
        main.appendChild(g);
    } else if(t === "audio") {
        main.innerHTML = `<span class="label">Shadowing Training</span><div class="q-txt">🔊 Listening...</div>`;
        talk();
        const g = document.createElement('div'); g.className='opt-grid';
        [cur.en, "Wrong Meaning", "Not this"].sort(()=>0.5-Math.random()).forEach(o => {
            const b = document.createElement('div'); b.className='opt-btn'; b.innerText=o;
            b.onclick = () => { if(o===cur.en) next(); else b.style.borderColor='var(--red)'; };
            g.appendChild(b);
        });
        main.appendChild(g);
    } else { // Flash
        main.innerHTML = `<span class="label">Memory Recall</span><div class="q-txt" id="txt-f">${cur.es}</div><p style="opacity:0.5; font-size:12px;">Tap to Flip</p>`;
        main.onclick = () => document.getElementById('txt-f').innerText = cur.en;
        foot.innerHTML = `<button class="btn btn-run" onclick="next()">NEXT CARD</button>`;
    }
}

function check() {
    const guess = Array.from(document.getElementById('drop').children).map(c=>c.innerText).join(' ');
    if(guess === cur.es) next(); else { alert("Correct: " + cur.es); next(); }
}

function saveAndExit() {
    const elapsed = Math.floor((Date.now() - sessionStart) / 60000);
    user.mins += Math.max(elapsed, 1);
    localStorage.setItem('blink_1000h_v2', JSON.stringify(user));
    location.reload();
}

function updateHome() {
    document.getElementById('val-xp').innerText = user.xp;
    document.getElementById('val-hr').innerText = (user.mins / 60).toFixed(1);
    const p = Math.min((user.mins / 60000) * 100, 100);
    document.getElementById('fill-prog').style.width = p + "%";
    document.getElementById('txt-prog').innerText = `${user.mins} / 60,000 MIN`;
    
    const r = document.getElementById('rank');
    if(user.mins > 6000) r.innerText = "OFICIAL";
    if(user.mins > 30000) r.innerText = "MAESTRO";
    if(user.mins >= 59000) r.innerText = "LEYENDA ETERNA";
}

function talk() { 
    const u = new SpeechSynthesisUtterance(cur.es); 
    u.lang = 'es-MX'; window.speechSynthesis.speak(u); 
}

function show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
</script>
</body>
</html>
