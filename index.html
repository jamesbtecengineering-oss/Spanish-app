<html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blink Spanish: Colombia</title>
    <style>
        :root { --gold: #f1c40f; --blue: #2980b9; --red: #e74c3c; --bg: #f9f9f9; --win: #27ae60; }
        * { box-sizing: border-box; -webkit-user-select: none; touch-action: manipulation; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Screens */
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; padding: 20px; animation: fadeIn 0.3s; }
        .active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Menu */
        .menu-card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h1 { text-align: center; color: #333; margin-top: 0; }
        label { display: block; font-size: 12px; font-weight: 900; color: var(--blue); margin-top: 15px; text-transform: uppercase; }
        select { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #eee; font-size: 16px; margin-top: 5px; outline: none; }
        .btn-main { width: 100%; padding: 18px; border-radius: 15px; border: none; color: white; font-weight: 800; font-size: 18px; margin-top: 15px; }

        /* Flashcards */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: white; border-bottom: 1px solid #ddd; }
        .card-container { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .card { width: 90%; height: 60%; background: white; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; position: absolute; border: 1px solid #eee; }
        .card-text { font-size: 24px; font-weight: 700; color: #2c3e50; }
        .card-sub { font-size: 12px; color: var(--gold); font-weight: 900; letter-spacing: 2px; margin-bottom: 20px; text-transform: uppercase; }

        /* Match Game */
        .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; flex: 1; overflow-y: auto; padding: 10px 0; }
        .match-item { background: white; border: 2px solid #eee; border-radius: 12px; padding: 15px; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 14px; font-weight: 600; min-height: 80px; transition: 0.2s; }
        .selected { border-color: var(--blue); background: #ebf5fb; transform: scale(0.98); }
        .correct { background: var(--win) !important; color: white !important; border-color: var(--win) !important; visibility: hidden; }

        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 20px; background: white; }
        .btn-sm { border: none; padding: 15px; border-radius: 12px; color: white; font-weight: 700; }
    </style>
</head>
<body>

<div id="menu-screen" class="screen active">
    <h1>🇨🇴 Colombia Spanish</h1>
    <div class="menu-card">
        <label>Subject</label>
        <select id="subject">
            <option value="daily">Daily Life & Slang</option>
            <option value="travel">Travel (Directions/Transport)</option>
            <option value="social">Social & Parties</option>
        </select>
        
        <label>Level</label>
        <select id="level">
            <option value="A1">A1.1 (Beginner)</option>
            <option value="A2">A2.2 (Intermediate-Low)</option>
            <option value="B1">B1.2 (Intermediate-High)</option>
            <option value="B2">B2.3 (Advanced)</option>
        </select>

        <label>I want to see first:</label>
        <select id="view">
            <option value="es">Spanish</option>
            <option value="en">English</option>
            <option value="random">Random</option>
        </select>
    </div>
    <button class="btn-main" style="background:var(--blue);" onclick="initGame('flash')">Flashcards</button>
    <button class="btn-main" style="background:var(--win);" onclick="initGame('match')">Match Game</button>
</div>

<div id="flash-screen" class="screen" style="padding:0;">
    <div class="header">
        <button onclick="goMenu()" style="border:none; background:none; font-size:24px;">✕</button>
        <div id="status">0/0</div>
        <button onclick="speak()" style="border:none; background:none; font-size:24px;">🔊</button>
    </div>
    <div class="card-container" id="swipe-zone">
        <div id="main-card" class="card" onclick="flip()">
            <div id="card-type" class="card-sub">Spanish</div>
            <div id="card-content" class="card-text">Tap to Start</div>
        </div>
    </div>
    <div class="controls">
        <button class="btn-sm" style="background:var(--red)" onclick="handleSwipe('L')">MISS</button>
        <button class="btn-sm" style="background:#7f8c8d" onclick="flip()">FLIP</button>
        <button class="btn-sm" style="background:var(--win)" onclick="handleSwipe('R')">GOT IT</button>
    </div>
</div>

<div id="match-screen" class="screen">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>Match Pairs</h2>
        <button onclick="goMenu()" style="border:none; background:none; font-size:20px;">Exit</button>
    </div>
    <div id="match-grid" class="match-grid"></div>
</div>

<script>
// CONTENT LIBRARY (COLOMBIAN FLAVOR)
const library = {
    daily: {
        A1: [
            {es: "¡Qué más parce!", en: "What's up friend!"},
            {es: "¿Bien o qué?", en: "Are you good or what?"},
            {es: "Me regala un tinto", en: "Can I have a small black coffee"},
            {es: "Con mucho gusto", en: "With pleasure / You're welcome"},
            {es: "Una pola", en: "A beer"}
        ],
        A2: [
            {es: "¡Qué nota!", en: "How cool!"},
            {es: "Hágale pues", en: "Go ahead / Do it then"},
            {es: "Me suena mucho", en: "That sounds familiar to me"},
            {es: "¿Qué hay para hacer?", en: "What is there to do?"}
        ],
        B1: [
            {es: "No me dejes plantado", en: "Don't stand me up / Don't flake"},
            {es: "Esa vaina está cara", en: "That thing is expensive"},
            {es: "Estoy amañado aquí", en: "I'm very settled/happy here"}
        ],
        B2: [
            {es: "A la orden, ¿en qué le puedo colaborar?", en: "At your service, how can I help you?"},
            {es: "Si hubiera sabido, le habría avisado", en: "If I had known, I would have told you"}
        ]
    },
    travel: {
        A1: [{es: "La buseta", en: "The small bus"}, {es: "El aeropuerto", en: "The airport"}],
        B1: [{es: "Siga derecho dos cuadras", en: "Go straight for two blocks"}]
    },
    social: {
        A1: [{es: "¡Salud!", en: "Cheers!"}],
        B1: [{es: "Echemos rumba hoy", en: "Let's go party today"}]
    }
};

let deck = [];
let currentIdx = 0;
let isFlipped = false;
let userView = 'es';
let selectedMatch = null;

function initGame(mode) {
    const sub = document.getElementById('subject').value;
    const lvl = document.getElementById('level').value;
    userView = document.getElementById('view').value;
    
    deck = [...(library[sub][lvl] || library.daily.A1)];
    
    if(mode === 'flash') {
        showScreen('flash-screen');
        loadNext();
    } else {
        showScreen('match-screen');
        startMatch();
    }
}

function loadNext() {
    if(deck.length === 0) {
        document.getElementById('card-content').innerText = "🏆 All Done!";
        return;
    }
    currentIdx = Math.floor(Math.random() * deck.length);
    isFlipped = false;
    updateCard();
    document.getElementById('status').innerText = `Cards left: ${deck.length}`;
}

function updateCard() {
    const item = deck[currentIdx];
    let side = userView;
    if(side === 'random') side = Math.random() > 0.5 ? 'es' : 'en';
    
    const show = isFlipped ? (side === 'es' ? 'en' : 'es') : side;
    document.getElementById('card-type').innerText = show === 'es' ? "Spanish" : "English";
    document.getElementById('card-content').innerText = item[show];
}

function flip() { isFlipped = !isFlipped; updateCard(); }

function handleSwipe(dir) {
    if(dir === 'R') deck.splice(currentIdx, 1);
    loadNext();
}

function startMatch() {
    const grid = document.getElementById('match-grid');
    grid.innerHTML = '';
    let pairs = deck.slice(0, 5);
    let items = [];
    pairs.forEach((p, i) => {
        items.push({text: p.es, id: i, type: 'es'});
        items.push({text: p.en, id: i, type: 'en'});
    });
    items.sort(() => Math.random() - 0.5);

    items.forEach(data => {
        const div = document.createElement('div');
        div.className = 'match-item';
        div.innerText = data.text;
        div.onclick = () => {
            if(selectedMatch) {
                if(selectedMatch.data.id === data.id && selectedMatch.data.type !== data.type) {
                    div.classList.add('correct');
                    selectedMatch.el.classList.add('correct');
                    selectedMatch = null;
                } else {
                    selectedMatch.el.classList.remove('selected');
                    selectedMatch = {el: div, data: data};
                    div.classList.add('selected');
                }
            } else {
                selectedMatch = {el: div, data: data};
                div.classList.add('selected');
            }
        };
        grid.appendChild(div);
    });
}

function speak() {
    const synth = window.speechSynthesis;
    const text = deck[currentIdx].es;
    const utterance = new SpeechSynthesisUtterance(text);
    
    // Attempt to find Colombian/Latin voice
    const voices = synth.getVoices();
    const latVoice = voices.find(v => v.lang === 'es-MX' || v.lang === 'es-US');
    if(latVoice) utterance.voice = latVoice;
    
    utterance.rate = 0.9;
    synth.cancel();
    synth.speak(utterance);
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function goMenu() { showScreen('menu-screen'); }

window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
</script>
</body>
</html>
