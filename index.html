<html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLINK TITAN | The 1000-Hour Mastery OS</title>
    <style>
        :root {
            --bg: #020617; --card: #0f172a; --accent: #8b5cf6; --gold: #fbbf24;
            --text: #f8fafc; --green: #10b981; --red: #ef4444; --border: #1e293b;
            --blue: #3b82f6; --pink: #ec4899; --glass: rgba(255, 255, 255, 0.03);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            background: var(--bg); color: var(--text); margin: 0; 
            font-family: 'Inter', -apple-system, system-ui, sans-serif; 
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* --- UI SCAFFOLDING --- */
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; padding: 25px; overflow-y: auto; }
        .screen.active { display: flex; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .brand { font-size: 26px; font-weight: 950; letter-spacing: -1.5px; }
        .brand span { color: var(--accent); }

        /* --- DASHBOARD ELEMENTS --- */
        .mastery-card { 
            background: linear-gradient(165deg, var(--card) 0%, #1e293b 100%); 
            border-radius: 32px; padding: 25px; border: 1px solid var(--border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.6); margin-bottom: 30px;
        }
        .progress-label { display: flex; justify-content: space-between; font-size: 11px; font-weight: 900; letter-spacing: 1.5px; opacity: 0.8; }
        .bar-outer { width: 100%; height: 14px; background: rgba(0,0,0,0.4); border-radius: 7px; margin: 15px 0; overflow: hidden; }
        .bar-inner { height: 100%; background: linear-gradient(90deg, var(--accent), var(--blue)); width: 0%; transition: 2s cubic-bezier(0.16, 1, 0.3, 1); }
        
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .stat-box { background: var(--glass); padding: 15px 5px; border-radius: 20px; text-align: center; border: 1px solid var(--border); }
        .stat-val { display: block; font-size: 22px; font-weight: 900; color: var(--gold); }
        .stat-tag { font-size: 9px; text-transform: uppercase; font-weight: 800; opacity: 0.5; }

        /* --- PATH ELEMENTS --- */
        .path-title { font-size: 11px; font-weight: 900; color: var(--blue); text-transform: uppercase; letter-spacing: 2.5px; margin-bottom: 15px; }
        .node { 
            background: var(--card); padding: 22px; border-radius: 24px; margin-bottom: 15px;
            border: 1px solid var(--border); display: flex; align-items: center; cursor: pointer; transition: 0.2s;
        }
        .node.locked { opacity: 0.4; filter: grayscale(1); border-style: dashed; }
        .node-icon { width: 52px; height: 52px; background: var(--glass); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-right: 20px; }
        .node-name { font-size: 19px; font-weight: 800; }

        /* --- GAME ENGINE UI --- */
        .nav-game { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .q-wrap { text-align: center; margin: 20px 0 40px; }
        .q-hint { font-size: 12px; color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        .q-main { font-size: 2.4rem; font-weight: 900; line-height: 1.1; margin-top: 10px; }

        .opt-stack { display: grid; gap: 12px; width: 100%; }
        .opt-btn { background: var(--card); padding: 22px; border-radius: 22px; border: 1px solid var(--border); color: var(--text); font-weight: 700; text-align: left; font-size: 17px; cursor: pointer; }
        .opt-btn.correct { background: var(--green); border-color: var(--green); color: white; }
        .opt-btn.wrong { background: var(--red); border-color: var(--red); color: white; animation: shake 0.4s; }

        .drop-zone { min-height: 120px; background: rgba(0,0,0,0.2); border: 2px dashed var(--border); border-radius: 28px; padding: 20px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; align-items: center; }
        .word-chip { background: var(--accent); padding: 14px 22px; border-radius: 16px; font-weight: 800; color: white; cursor: pointer; box-shadow: 0 4px 0 #6d28d9; }

        /* --- REFERENCE SCREEN --- */
        .ref-card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        .ref-head { font-weight: 900; font-size: 18px; color: var(--gold); border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .verb-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .verb-item { font-size: 13px; opacity: 0.8; }
        .verb-item b { color: var(--accent); }

        /* --- BUTTONS --- */
        .btn-footer { background: var(--accent); color: white; border: none; padding: 22px; border-radius: 22px; font-size: 18px; font-weight: 900; width: 100%; cursor: pointer; box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4); margin-top: 10px; }
        .btn-tab { background: var(--card); border: 1px solid var(--border); color: white; padding: 10px 15px; border-radius: 12px; font-size: 12px; font-weight: 800; cursor: pointer; }
        .btn-tab.active { background: var(--accent); border-color: var(--accent); }

        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div id="scr-dash" class="screen active">
    <div class="header">
        <div class="brand">BLINK<span>TITAN</span></div>
        <div style="text-align: right;">
            <div id="disp-streak" style="font-size: 24px; font-weight: 950; color: #ff4d4d;">🔥 0</div>
            <div class="stat-tag">Daily Streak</div>
        </div>
    </div>

    <div class="mastery-card">
        <div class="progress-label"><span>TOTAL MASTERY QUOTA</span><span id="disp-pct">0.0%</span></div>
        <div class="bar-outer"><div id="bar-main" class="bar-inner"></div></div>
        <div class="stat-grid">
            <div class="stat-box"><span class="stat-val" id="disp-xp">0</span><span class="stat-tag">XP</span></div>
            <div class="stat-box"><span class="stat-val" id="disp-min">0</span><span class="stat-tag">Mins</span></div>
            <div class="stat-box"><span class="stat-val" id="disp-rank">0</span><span class="stat-tag">Rank</span></div>
        </div>
    </div>

    <div style="display:flex; gap:10px; margin-bottom:25px;">
        <button class="btn-tab active" onclick="showPath()">THE PATH</button>
        <button class="btn-tab" onclick="showRef()">VERB DRIVE</button>
        <button class="btn-tab" onclick="showDict()">DICTIONARY</button>
    </div>

    <div id="dash-content">
        <div class="path-title">Learning Trajectory</div>
        <div id="path-map"></div>
    </div>
</div>

<div id="scr-game" class="screen">
    <div class="nav-game">
        <button onclick="quitGame()" style="background:none; border:none; color:white; font-size:32px;">✕</button>
        <div style="text-align:center;">
            <div id="mod-title" class="stat-tag" style="color:var(--accent)">FOUNDATION</div>
            <div id="game-dots" style="display:flex; gap:6px; margin-top:8px; justify-content:center;"></div>
        </div>
        <button onclick="audioPlay()" style="background:none; border:none; color:white; font-size:32px;">🔊</button>
    </div>
    <div id="game-mount" style="flex:1; display:flex; flex-direction:column; justify-content:center;"></div>
    <div id="game-footer" style="padding-bottom:20px;"></div>
</div>

/**
 * THE DICTIONARY DATASET
 */
const DICT = [
    {es:"Amigo", en:"Friend"}, {es:"Casa", en:"House"}, {es:"Trabajo", en:"Work"},
    {es:"Ciudad", en:"City"}, {es:"Tiempo", en:"Time"}, {es:"Vida", en:"Life"},
    {es:"Gente", en:"People"}, {es:"Mundo", en:"World"}, {es:"Escuela", en:"School"},

    {es:"Familia", en:"Family"}, {es:"Agua", en:"Water"}, {es:"Noche", en:"Night"},
    {es:"Mañana", en:"Morning"}, {es:"Lugar", en:"Place"}, {es:"País", en:"Country"},

];

// STATE MANAGEMENT
let state = JSON.parse(localStorage.getItem('titan_master_v12')) || {
    xp: 0, mins: 0, unlocked: 0, streak: 0, lastDate: null, history: []
};

let active = { mod: null, deck: [], cur: null, start: null, count: 0, total: 0 };

function init() {
    updateUI();
    showPath();
    processStreak();
}

function processStreak() {
    const today = new Date().toDateString();
    if(state.lastDate !== today) {
        const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
        if(state.lastDate === yesterday.toDateString()) state.streak++;
        else if(state.lastDate) state.streak = 1;
        state.lastDate = today;
        save();
    }
}

// DASHBOARD RENDERING
function showPath() {
    toggleTabs(0);
    const container = document.getElementById('dash-content');
    container.innerHTML = '<div class="path-title">Learning Trajectory</div><div id="path-map"></div>';
    const map = document.getElementById('path-map');
    CURRICULUM.forEach(m => {
        const locked = m.id > state.unlocked;
        const div = document.createElement('div');
        div.className = `node ${locked ? 'locked' : (m.id < state.unlocked ? 'done' : 'active')}`;
        div.onclick = () => { if(!locked) launch(m); };
        div.innerHTML = `
            <div class="node-icon">${locked ? '🔒' : m.icon}</div>
            <div style="flex:1">
                <div style="font-size:10px; font-weight:900; color:var(--accent);">${m.lvl} • ${locked ? 'Locked' : 'Open'}</div>
                <div class="node-name">${m.topic}</div>
            </div>
            ${!locked && m.id < state.unlocked ? '<div style="color:var(--green)">✓</div>' : ''}
        `;
        map.appendChild(div);
    });
}

function showRef() {
    toggleTabs(1);
    const container = document.getElementById('dash-content');
    container.innerHTML = '<div class="path-title">Verb Conjugation Drive</div>';
    for(let v in VERB_DRIVE) {
        const d = VERB_DRIVE[v];
        const card = document.createElement('div');
        card.className = 'ref-card';
        card.innerHTML = `
            <div class="ref-head"><span>${v}</span><span style="font-size:10px; opacity:0.5;">TOP VERB</span></div>
            <div class="verb-grid">
                <div class="verb-item"><b>Pres:</b> ${d.pres.slice(0,3).join(', ')}...</div>
                <div class="verb-item"><b>Past:</b> ${d.past.slice(0,3).join(', ')}...</div>
            </div>
        `;
        container.appendChild(card);
    }
}

function showDict() {
    toggleTabs(2);
    const container = document.getElementById('dash-content');
    container.innerHTML = '<div class="path-title">Essential Dictionary</div>';
    const grid = document.createElement('div');
    grid.style.display = 'grid'; grid.style.gridTemplateColumns = '1fr 1fr'; grid.style.gap = '10px';
    DICT.forEach(i => {
        const d = document.createElement('div');
        d.className = 'ref-card'; d.style.padding = '12px'; d.style.marginBottom = '0';
        d.innerHTML = `<div style="font-weight:900; color:var(--accent);">${i.es}</div><div style="font-size:11px; opacity:0.6;">${i.en}</div>`;
        grid.appendChild(d);
    });
    container.appendChild(grid);
}

// GAME CORE
function launch(m) {
    active = { mod: m, deck: [...m.data].sort(()=>0.5-Math.random()), start: Date.now(), count: 0, total: m.data.length };
    document.getElementById('mod-title').innerText = m.topic.toUpperCase();
    showScreen('scr-game');
    genDots();
    next();
}

function next() {
    if(active.deck.length === 0) return finalize();
    active.cur = active.deck.pop();
    active.count++;
    updateDots();
    renderGame();
}

function renderGame() {
    const mount = document.getElementById('game-mount');
    const footer = document.getElementById('game-footer');
    mount.innerHTML = ''; footer.innerHTML = '';

    const type = Math.random() > 0.5 ? 'scramble' : 'choice';

    if(type === 'scramble') {
        mount.innerHTML = `<div class="q-wrap"><div class="q-hint">Translate to Spanish</div><div class="q-main" style="font-size:1.6rem; opacity:0.6;">${active.cur.en}</div></div><div class="drop-zone" id="drop"></div><div id="pool" style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center;"></div>`;
        active.cur.es.split(' ').sort(()=>0.5-Math.random()).forEach(w => {
            const chip = document.createElement('div'); chip.className = 'word-chip'; chip.innerText = w;
            chip.onclick = () => { (chip.parentElement.id === 'pool' ? document.getElementById('drop') : document.getElementById('pool')).appendChild(chip); };
            document.getElementById('pool').appendChild(chip);
        });
        footer.innerHTML = `<button class="btn-footer" onclick="validate()">VALIDATE</button>`;
    } else {
        mount.innerHTML = `<div class="q-wrap"><div class="q-hint">Select Translation</div><div class="q-main">${active.cur.es}</div></div><div class="opt-stack" id="opts"></div>`;
        const choices = [active.cur.en, "Incorrect Meaning", "Wrong Option", "Not this"].sort(()=>0.5-Math.random());
        choices.forEach(c => {
            const b = document.createElement('button'); b.className = 'opt-btn'; b.innerText = c;
            b.onclick = () => {
                if(c === active.cur.en) { state.xp += 15; b.classList.add('correct'); setTimeout(next, 500); }
                else { b.classList.add('wrong'); }
            };
            document.getElementById('opts').appendChild(b);
        });
    }
}

function validate() {
    const guess = Array.from(document.getElementById('drop').children).map(c=>c.innerText).join(' ');
    if(guess === active.cur.es) { state.xp += 25; next(); }
    else { alert("Correction: " + active.cur.es); next(); }
}

function finalize() {
    if(active.mod.id === state.unlocked) state.unlocked++;
    const duration = Math.floor((Date.now() - active.start) / 60000);
    state.mins += Math.max(duration, 1);
    save(); quitGame();
}

function quitGame() { showScreen('scr-dash'); init(); }

// UTILITIES
function updateUI() {
    document.getElementById('disp-xp').innerText = state.xp;
    document.getElementById('disp-min').innerText = state.mins;
    document.getElementById('disp-streak').innerText = `🔥 ${state.streak}`;
    const pct = (state.mins / 60000) * 100;
    document.getElementById('disp-pct').innerText = pct.toFixed(2) + "%";
    document.getElementById('bar-main').style.width = Math.min(pct, 100) + "%";
    let r = "RECRUIT";
    if(state.mins > 1000) r = "PAISA";
    if(state.mins > 10000) r = "VETERAN";
    if(state.mins > 40000) r = "LEGEND";
    document.getElementById('disp-rank').innerText = r;
}

function toggleTabs(idx) {
    const tabs = document.querySelectorAll('.btn-tab');
    tabs.forEach((t, i) => i === idx ? t.classList.add('active') : t.classList.remove('active'));
}

function save() { localStorage.setItem('titan_master_v12', JSON.stringify(state)); }
function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function audioPlay() { const u = new SpeechSynthesisUtterance(active.cur.es); u.lang = 'es-MX'; window.speechSynthesis.speak(u); }
function genDots() {
    const d = document.getElementById('game-dots'); d.innerHTML = '';
    for(let i=0; i<active.total; i++) {
        const dot = document.createElement('div');
        dot.style.width='7px'; dot.style.height='7px'; dot.style.borderRadius='50%'; dot.style.background='var(--border)';
        d.appendChild(dot);
    }
}
function updateDots() {
    const dots = document.getElementById('game-dots').children;
    if(dots[active.count-1]) dots[active.count-1].style.background = 'var(--accent)';
}

init();
</script>
</body>
</html>
