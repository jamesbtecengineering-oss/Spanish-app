<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLINK TITAN | THE 1000-HOUR MASTER OS</title>
    <style>
        :root {
            --bg: #020617; 
            --card: #0f172a; 
            --accent: #8b5cf6; 
            --gold: #fbbf24;
            --text: #f8fafc; 
            --green: #10b981; 
            --red: #ef4444; 
            --border: #1e293b;
            --blue: #3b82f6; 
            --glass: rgba(255, 255, 255, 0.03);
            --shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: var(--bg); color: var(--text); margin: 0; 
            font-family: 'Inter', -apple-system, sans-serif; 
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        .screen { display: none; flex-direction: column; height: 100%; width: 100%; padding: 25px; overflow-y: auto; }
        .screen.active { display: flex; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .brand { font-size: 28px; font-weight: 950; letter-spacing: -1.5px; }
        .brand span { color: var(--accent); }

        /* DASHBOARD */
        .mastery-card { 
            background: linear-gradient(165deg, var(--card) 0%, #1e293b 100%); 
            border-radius: 35px; padding: 30px; border: 1px solid var(--border);
            box-shadow: var(--shadow); margin-bottom: 30px; position: relative; overflow: hidden;
        }
        
        .progress-label { display: flex; justify-content: space-between; font-size: 11px; font-weight: 900; letter-spacing: 2px; opacity: 0.8; text-transform: uppercase; }
        .bar-outer { width: 100%; height: 14px; background: rgba(0,0,0,0.4); border-radius: 7px; margin: 18px 0; overflow: hidden; border: 1px solid var(--border); }
        .bar-inner { height: 100%; background: linear-gradient(90deg, var(--accent), var(--blue)); width: 0%; transition: 1.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .stat-box { background: var(--glass); padding: 15px 5px; border-radius: 22px; text-align: center; border: 1px solid var(--border); backdrop-filter: blur(10px); }
        .stat-val { display: block; font-size: 24px; font-weight: 950; color: var(--gold); }
        .stat-tag { font-size: 9px; text-transform: uppercase; font-weight: 900; opacity: 0.5; letter-spacing: 1px; }

        /* PATH */
        .path-title { font-size: 12px; font-weight: 900; color: var(--blue); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .path-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }

        .node { 
            background: var(--card); padding: 24px; border-radius: 28px; margin-bottom: 16px;
            border: 1px solid var(--border); display: flex; align-items: center; cursor: pointer; transition: 0.3s;
        }
        .node.locked { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; border-style: dashed; }
        .node.done { border-color: var(--green); background: rgba(16, 185, 129, 0.03); }
        .node.active { border-color: var(--accent); box-shadow: 0 0 20px rgba(139, 92, 246, 0.2); }

        .node-icon { width: 56px; height: 56px; background: var(--glass); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 26px; margin-right: 22px; }
        .node-name { font-size: 20px; font-weight: 800; }
        .node-meta { font-size: 10px; font-weight: 900; color: var(--accent); margin-bottom: 4px; text-transform: uppercase; }

        /* GAME */
        .nav-game { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .q-wrap { text-align: center; margin: 20px 0 50px; }
        .q-hint { font-size: 13px; color: var(--accent); font-weight: 900; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px; }
        .q-main { font-size: 2.5rem; font-weight: 950; line-height: 1.1; letter-spacing: -1px; }
        .q-sub { font-size: 1.5rem; opacity: 0.5; margin-top: 10px; font-weight: 700; }

        .opt-stack { display: grid; gap: 14px; width: 100%; }
        .opt-btn { 
            background: var(--card); padding: 24px; border-radius: 24px; border: 1px solid var(--border); 
            color: var(--text); font-weight: 800; font-size: 18px; cursor: pointer; transition: 0.2s;
        }
        .opt-btn.correct { background: var(--green) !important; color: white; }
        .opt-btn.wrong { background: var(--red) !important; color: white; animation: shake 0.4s; }

        .drop-zone { 
            min-height: 120px; background: rgba(0,0,0,0.2); border: 2px dashed var(--border); 
            border-radius: 32px; padding: 20px; margin-bottom: 25px; display: flex; flex-wrap: wrap; 
            gap: 10px; justify-content: center; align-items: center; 
        }
        .word-chip { 
            background: var(--accent); padding: 15px 22px; border-radius: 18px; 
            font-weight: 900; color: white; cursor: pointer; box-shadow: 0 5px 0 #6d28d9; 
        }

        /* RECAP */
        #recap-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: none; flex-direction: column; padding: 40px 25px; overflow-y: auto; }
        .recap-hero { background: var(--card); border-radius: 35px; padding: 35px; border: 1px solid var(--border); margin-bottom: 25px; text-align: center; }
        .recap-item { background: var(--glass); padding: 18px; border-radius: 20px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .recap-es { font-weight: 900; color: var(--accent); }
        .bridge-card { background: linear-gradient(to right, #1e1b4b, #0f172a); padding: 25px; border-radius: 25px; border: 1px solid var(--blue); margin-bottom: 30px; }

        .btn-footer { 
            background: var(--accent); color: white; border: none; padding: 25px; border-radius: 25px; 
            font-size: 18px; font-weight: 950; width: 100%; cursor: pointer; text-transform: uppercase;
        }
        
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-10px)} 75%{transform:translateX(10px)} }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
