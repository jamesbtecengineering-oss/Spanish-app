<html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BLINK TITAN | INFINITE ARCHIVE</title>
    <style>
        :root {
            --bg: #020617; --card: #0f172a; --accent: #8b5cf6; --gold: #fbbf24;
            --text: #f8fafc; --green: #10b981; --red: #ef4444; --border: #1e293b;
            --blue: #3b82f6; --safe-top: env(safe-area-inset-top);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; user-select: none; }
        body { 
            background: var(--bg); color: var(--text); margin: 0; 
            font-family: -apple-system, system-ui, sans-serif;
            height: 100vh; overflow: hidden; position: fixed; width: 100%;
        }

        .screen { 
            position: absolute; inset: 0; display: none; flex-direction: column; 
            padding: calc(20px + var(--safe-top)) 20px 20px; background: var(--bg);
        }
        .screen.active { display: flex; animation: viewSlide 0.4s cubic-bezier(0.1, 0.9, 0.2, 1); }
        @keyframes viewSlide { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .mastery-card { 
            background: linear-gradient(165deg, var(--card) 0%, #1e293b 100%); 
            border-radius: 30px; padding: 25px; border: 1px solid var(--border);
            box-shadow: 0 15px 40px rgba(0,0,0,0.5); margin-bottom: 20px;
        }
        .bar-outer { width: 100%; height: 10px; background: #000; border-radius: 5px; margin: 12px 0; overflow: hidden; }
        .bar-inner { height: 100%; background: linear-gradient(90deg, var(--accent), var(--blue)); width: 0%; transition: 1.5s ease; }
        
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: center; }
        .stat-val { display: block; font-size: 20px; font-weight: 900; color: var(--gold); }
        .stat-lab { font-size: 9px; opacity: 0.5; font-weight: 900; text-transform: uppercase; }

        .tab-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .tab { 
            padding: 16px; border-radius: 18px; background: var(--card); border: 1px solid var(--border);
            color: #fff; font-weight: 800; font-size: 12px; text-align: center;
        }
        .tab.active { background: var(--accent); border-color: var(--accent); }

        .scroll-zone { flex: 1; overflow-y: auto; padding-bottom: 40px; -webkit-overflow-scrolling: touch; }
        .node { 
            background: var(--card); padding: 20px; border-radius: 24px; margin-bottom: 12px;
            border: 1px solid var(--border); display: flex; align-items: center; transition: 0.2s;
        }
        .node:active { transform: scale(0.96); background: var(--border); }
        .node.locked { opacity: 0.3; filter: grayscale(1); pointer-events: none; }

        .kinetic-area { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; perspective: 1000px; }
        .card-obj { position: absolute; width: 85vw; height: 50vh; max-height: 400px; will-change: transform; }
        .card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-inner.flipped { transform: rotateY(180deg); }
        .face { 
            position: absolute; inset: 0; backface-visibility: hidden; border-radius: 40px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 35px; text-align: center; border: 2px solid var(--border); background: var(--card);
        }
        .face-back { background: var(--accent); transform: rotateY(180deg); color: white; }
        
        .speak-btn { 
            background: rgba(255,255,255,0.1); border: none; border-radius: 50%; 
            width: 55px; height: 55px; color: white; font-size: 24px; margin-top: 20px;
        }

        .drop-zone { min-height: 120px; background: rgba(0,0,0,0.2); border: 2px dashed var(--border); border-radius: 25px; padding: 15px; margin: 20px 0; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: center; }
        .word-chip { background: var(--accent); padding: 12px 18px; border-radius: 14px; font-weight: 800; font-size: 14px; border-bottom: 4px solid rgba(0,0,0,0.2); }

        .footer-btn { background: var(--accent); color: white; border: none; padding: 22px; border-radius: 22px; font-weight: 900; font-size: 16px; width: 100%; margin-top: auto; }

        .indicator { position: fixed; top: 50%; transform: translateY(-50%); font-size: 70px; font-weight: 900; opacity: 0; pointer-events: none; z-index: 1000; }
        .ind-l { left: 30px; color: var(--red); }
        .ind-r { right: 30px; color: var(--green); }
    </style>
</head>
<body>

<div id="scr-dash" class="screen active">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <div style="font-size:24px; font-weight:950; letter-spacing:-1px;">BLINK<span>TITAN</span></div>
        <div id="streak-val" style="color:var(--red); font-weight:900; font-size:18px;">🔥 0</div>
    </div>
    
    <div class="mastery-card">
        <div style="display:flex; justify-content:space-between; font-size:10px; font-weight:900; opacity:0.6;"><span>INFINITE ARCHIVE SYNC</span><span id="pct-val">0%</span></div>
        <div class="bar-outer"><div id="bar-fill" class="bar-inner"></div></div>
        <div class="stat-grid">
            <div><span class="stat-val" id="xp-val" style="color:var(--gold)">0</span><span class="stat-lab">XP</span></div>
            <div><span class="stat-val" id="lvl-val">1</span><span class="stat-lab">RANK</span></div>
            <div><span class="stat-val" id="done-val">0</span><span class="stat-lab">CLEARED</span></div>
        </div>
    </div>

    <div class="tab-row">
        <div class="tab active" id="tab-game" onclick="setMode('game')">CHALLENGE</div>
        <div class="tab" id="tab-study" onclick="setMode('study')">SWIPE ARCHIVE</div>
    </div>

    <div class="scroll-zone" id="mod-list"></div>
</div>

<div id="scr-study" class="screen">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <button onclick="goHome()" style="background:none; border:none; color:white; font-size:30px;">✕</button>
        <div id="study-title" class="stat-lab" style="color:var(--accent)">MODULE</div>
        <div id="deck-left" style="font-weight:900; color:var(--accent)">0</div>
    </div>
    <div class="kinetic-area" id="kinetic-anchor"></div>
    <div style="text-align:center; opacity:0.3; font-size:10px; font-weight:900; padding:10px;">RECYCLE (LEFT) • MASTER (RIGHT)</div>
</div>

<div id="scr-game" class="screen">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <button onclick="goHome()" style="background:none; border:none; color:white; font-size:30px;">✕</button>
        <div id="game-dots" style="display:flex; gap:5px;"></div>
        <button onclick="voiceOut()" style="background:none; border:none; color:white; font-size:24px;">🔊</button>
    </div>
    <div style="flex:1; display:flex; flex-direction:column; justify-content:center; text-align:center;">
        <div class="stat-lab" style="color:var(--accent); margin-bottom:10px;">NEURAL TARGET</div>
        <h1 id="game-en" style="font-size:28px; margin:0 0 20px;">...</h1>
        <div class="drop-zone" id="game-drop"></div>
        <div id="game-pool" style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center;"></div>
    </div>
    <button class="footer-btn" onclick="checkGame()">VALIDATE LINK</button>
</div>

<div class="indicator ind-l">✕</div>
<div class="indicator ind-r">✓</div>

<script>
/**
 * THE INFINITE CURRICULUM (20 MODULES | 240+ PHRASES)
 */
const INF_ARCHIVE = [
    { id: 0, lvl: "A1.1", icon: "👋", topic: "Identity", data: [{es:"Yo soy de Colombia", en:"I am from Colombia"},{es:"Él es mi amigo", en:"He is my friend"},{es:"Somos estudiantes", en:"We are students"},{es:"Ella es profesora", en:"She is a teacher"},{es:"Usted es muy amable", en:"You are very kind"},{es:"Ellos son doctores", en:"They are doctors"}]},
    { id: 1, lvl: "A1.2", icon: "🍎", topic: "Basics", data: [{es:"Tengo mucha hambre", en:"I am very hungry"},{es:"Quiero agua fría", en:"I want cold water"},{es:"¿Dónde está el baño?", en:"Where is the bathroom?"},{es:"Necesito ayuda ahora", en:"I need help now"},{es:"Tengo sueño", en:"I am sleepy"},{es:"No entiendo nada", en:"I don't understand anything"}]},
    { id: 2, lvl: "A2.1", icon: "🏠", topic: "Home", data: [{es:"Vivo en una casa", en:"I live in a house"},{es:"La cocina es pequeña", en:"The kitchen is small"},{es:"Mi cama es cómoda", en:"My bed is comfortable"},{es:"Limpio mi cuarto", en:"I clean my room"},{es:"Hay flores afuera", en:"There are flowers outside"},{es:"Abro la ventana", en:"I open the window"}]},
    { id: 3, lvl: "A2.2", icon: "🚌", topic: "Travel", data: [{es:"Tomo el autobús", en:"I take the bus"},{es:"El tren llega tarde", en:"The train is late"},{es:"Busco mi pasaporte", en:"I am looking for my passport"},{es:"¿Cuánto cuesta el taxi?", en:"How much is the taxi?"},{es:"El avión despega", en:"The plane takes off"},{es:"Viajo con mi familia", en:"I travel with my family"}]},
    { id: 4, lvl: "B1.1", icon: "💼", topic: "Office", data: [{es:"Tengo una reunión", en:"I have a meeting"},{es:"Envío un correo", en:"I send an email"},{es:"El jefe está ocupado", en:"The boss is busy"},{es:"Uso la computadora", en:"I use the computer"},{es:"Firmo el documento", en:"I sign the document"},{es:"Llego a tiempo", en:"I arrive on time"}]},
    { id: 5, lvl: "B1.2", icon: "🎭", topic: "Feelings", data: [{es:"Me siento feliz hoy", en:"I feel happy today"},{es:"Estoy muy cansado", en:"I am very tired"},{es:"Ella está enojada", en:"She is angry"},{es:"Es una sorpresa", en:"It is a surprise"},{es:"No tengas miedo", en:"Don't be afraid"},{es:"Estamos emocionados", en:"We are excited"}]},
    { id: 6, lvl: "B1.3", icon: "🍕", topic: "Dining", data: [{es:"La cuenta, por favor", en:"The check, please"},{es:"Soy vegetariano", en:"I am a vegetarian"},{es:"La comida está rica", en:"The food is delicious"},{es:"Quiero una mesa", en:"I want a table"},{es:"¿Qué recomienda usted?", en:"What do you recommend?"},{es:"Sin cebolla, por favor", en:"No onions, please"}]},
    { id: 7, lvl: "B2.1", icon: "⚖️", topic: "Justice", data: [{es:"Es mi derecho legal", en:"It is my legal right"},{es:"El juez decidió", en:"The judge decided"},{es:"Bajo la ley actual", en:"Under the current law"},{es:"Firmar el contrato", en:"To sign the contract"},{es:"Pagar la multa", en:"To pay the fine"},{es:"Declarar la verdad", en:"To declare the truth"}]},
    { id: 8, lvl: "B2.2", icon: "🌍", topic: "Planet", data: [{es:"Cuidar el ambiente", en:"To care for the environment"},{es:"Reciclar el plástico", en:"To recycle the plastic"},{es:"El clima cambia", en:"The climate changes"},{es:"Energía solar limpia", en:"Clean solar energy"},{es:"Salvar los océanos", en:"To save the oceans"},{es:"Plantar un árbol", en:"To plant a tree"}]},
    { id: 9, lvl: "B2.3", icon: "💻", topic: "Tech", data: [{es:"La señal es débil", en:"The signal is weak"},{es:"Borrar el historial", en:"To clear history"},{es:"Descarga la app", en:"Download the app"},{es:"Clave de seguridad", en:"Security password"},{es:"Pantalla táctil rota", en:"Broken touch screen"},{es:"Error de sistema", en:"System error"}]},
    { id: 10, lvl: "C1.1", icon: "🧠", topic: "Logic", data: [{es:"Es un dilema ético", en:"It is an ethical dilemma"},{es:"Analizar los datos", en:"To analyze the data"},{es:"Una conclusión lógica", en:"A logical conclusion"},{es:"Deducir el resultado", en:"To deduce the result"},{es:"La premisa es falsa", en:"The premise is false"},{es:"Pensamiento crítico", en:"Critical thinking"}]},
    { id: 11, lvl: "C1.2", icon: "📈", topic: "Finance", data: [{es:"Inversión de riesgo", en:"Risk investment"},{es:"El mercado fluctúa", en:"The market fluctuates"},{es:"Ganancia neta anual", en:"Annual net profit"},{es:"Tasa de interés alta", en:"High interest rate"},{es:"Acciones en bolsa", en:"Stock market shares"},{es:"Deuda externa", en:"External debt"}]},
    { id: 12, lvl: "C1.3", icon: "🏛️", topic: "Politics", data: [{es:"Votar en elecciones", en:"To vote in elections"},{es:"Campaña electoral", en:"Electoral campaign"},{es:"El senado aprobó", en:"The senate approved"},{es:"Derechos humanos", en:"Human rights"},{es:"Corrupción estatal", en:"State corruption"},{es:"Libertad de prensa", en:"Freedom of the press"}]},
    { id: 13, lvl: "C1.4", icon: "🔬", topic: "Science", data: [{es:"Teoría de cuerdas", en:"String theory"},{es:"Células madre", en:"Stem cells"},{es:"Evolución genética", en:"Genetic evolution"},{es:"Reacción química", en:"Chemical reaction"},{es:"Espacio exterior", en:"Outer space"},{es:"Gravedad cero", en:"Zero gravity"}]},
    { id: 14, lvl: "C2.1", icon: "📜", topic: "History", data: [{es:"Civilización antigua", en:"Ancient civilization"},{es:"El imperio cayó", en:"The empire fell"},{es:"Guerra de independencia", en:"War of independence"},{es:"Tratado de paz", en:"Peace treaty"},{es:"Edad media", en:"Middle ages"},{es:"Revolución industrial", en:"Industrial revolution"}]},
    { id: 15, lvl: "C2.2", icon: "🎨", topic: "Art Theory", data: [{es:"Perspectiva visual", en:"Visual perspective"},{es:"Obra maestra", en:"Masterpiece"},{es:"Pinceladas suaves", en:"Soft brushstrokes"},{es:"Arte contemporáneo", en:"Contemporary art"},{es:"Escultura de mármol", en:"Marble sculpture"},{es:"Galería de arte", en:"Art gallery"}]},
    { id: 16, lvl: "C2.3", icon: "🎵", topic: "Music", data: [{es:"Ritmo sincopado", en:"Syncopated rhythm"},{es:"Melodía armoniosa", en:"Harmonious melody"},{es:"Compositor clásico", en:"Classical composer"},{es:"Concierto en vivo", en:"Live concert"},{es:"Instrumento de cuerda", en:"String instrument"},{es:"Voz soprano", en:"Soprano voice"}]},
    { id: 17, lvl: "C2.4", icon: "🏥", topic: "Medical", data: [{es:"Cirugía compleja", en:"Complex surgery"},{es:"Diagnóstico precoz", en:"Early diagnosis"},{es:"Tratamiento médico", en:"Medical treatment"},{es:"Presión arterial", en:"Blood pressure"},{es:"Sistema inmune", en:"Immune system"},{es:"Receta médica", en:"Medical prescription"}]},
    { id: 18, lvl: "C2.5", icon: "🏹", topic: "Literature", data: [{es:"Metáfora poética", en:"Poetic metaphor"},{es:"Narrativa épica", en:"Epic narrative"},{es:"Género literario", en:"Literary genre"},{es:"Protagonista trágico", en:"Tragic protagonist"},{es:"Capítulo final", en:"Final chapter"},{es:"Autor anónimo", en:"Anonymous author"}]},
    { id: 19, lvl: "D1.1", icon: "🌌", topic: "Philosophy", data: [{es:"Existencia humana", en:"Human existence"},{es:"Moral absoluta", en:"Absolute morality"},{es:"Libre albedrío", en:"Free will"},{es:"Conciencia pura", en:"Pure consciousness"},{es:"Eterno retorno", en:"Eternal return"},{es:"Verdad objetiva", en:"Objective truth"}]}
];

/** STATE ENGINE */
let db = JSON.parse(localStorage.getItem('blink_inf_v26')) || { xp:0, unlocked:0, completed:[], streak:0, lastDate:null };
let active = { mode:'game', mod:null, deck:[], cur:null, startX:0, curX:0, drag:false };

function boot() {
    updateUI();
    renderModules();
}

function setMode(m) {
    active.mode = m;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-'+m).classList.add('active');
}

function renderModules() {
    const box = document.getElementById('mod-list');
    box.innerHTML = '';
    INF_ARCHIVE.forEach((m, i) => {
        const locked = i > db.unlocked;
        const div = document.createElement('div');
        div.className = `node ${locked ? 'locked' : ''}`;
        div.onclick = () => { if(!locked) active.mode === 'game' ? launchGame(m) : launchStudy(m); };
        div.innerHTML = `
            <div style="font-size:28px; margin-right:15px; width:50px; text-align:center;">${locked?'🔒':m.icon}</div>
            <div style="flex:1">
                <small style="font-weight:900; color:var(--accent);">${m.lvl}</small>
                <div style="font-weight:800; font-size:16px;">${m.topic}</div>
            </div>
            ${db.completed.includes(m.id)?'<span style="color:var(--green); font-size:18px;">✓</span>':''}
        `;
        box.appendChild(div);
    });
}

/** KINETIC ENGINE */
function launchStudy(m) {
    active.mod = m;
    active.deck = [...m.data].sort(() => 0.5 - Math.random());
    document.getElementById('study-title').innerText = m.topic;
    showScreen('scr-study');
    renderCard();
}

function renderCard() {
    const anchor = document.getElementById('kinetic-anchor');
    anchor.innerHTML = '';
    document.getElementById('deck-left').innerText = active.deck.length;
    if(active.deck.length === 0) return goHome();

    const data = active.deck[0];
    const card = document.createElement('div');
    card.className = 'card-obj';
    card.innerHTML = `
        <div class="card-inner" id="card-inner-obj">
            <div class="face">
                <div class="stat-lab">CONTEXT (EN)</div>
                <h2 style="font-size:24px;">${data.en}</h2>
                <div style="margin-top:30px; opacity:0.3; font-size:10px; font-weight:900;">TAP TO REVEAL</div>
            </div>
            <div class="face face-back">
                <div class="stat-lab" style="color:white;">SPEECH (ES)</div>
                <h2 style="font-size:24px;">${data.es}</h2>
                <button class="speak-btn" onclick="event.stopPropagation(); voiceOutText('${data.es}')">🔊</button>
            </div>
        </div>
    `;

    card.addEventListener('touchstart', (e) => { active.startX = e.touches[0].clientX; active.drag = true; card.style.transition = 'none'; });
    card.addEventListener('touchmove', (e) => {
        if(!active.drag) return;
        active.curX = e.touches[0].clientX - active.startX;
        card.style.transform = `translate3d(${active.curX}px, 0, 0) rotate(${active.curX/12}deg)`;
        document.querySelector('.ind-l').style.opacity = active.curX < -60 ? 1 : 0;
        document.querySelector('.ind-r').style.opacity = active.curX > 60 ? 1 : 0;
    });

    card.addEventListener('touchend', () => {
        active.drag = false;
        if(Math.abs(active.curX) > 130) {
            handleSwipe(active.curX > 0 ? 1 : -1, card);
        } else {
            if(Math.abs(active.curX) < 5) document.getElementById('card-inner-obj').classList.toggle('flipped');
            card.style.transition = '0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            card.style.transform = `translate3d(0,0,0) rotate(0deg)`;
        }
        document.querySelector('.ind-l').style.opacity = 0; document.querySelector('.ind-r').style.opacity = 0;
    });
    anchor.appendChild(card);
}

function handleSwipe(dir, el) {
    el.style.transition = '0.3s ease-in';
    el.style.transform = `translate3d(${dir * 800}px, 0, 0) rotate(${dir * 45}deg)`;
    setTimeout(() => {
        const item = active.deck.shift();
        if(dir === -1) active.deck.splice(3, 0, item); // Spaced repetition injection
        else db.xp += 10;
        renderCard(); updateUI();
    }, 300);
}

/** GAME ENGINE */
function launchGame(m) {
    active.mod = m;
    active.deck = [...m.data].sort(() => 0.5 - Math.random());
    showScreen('scr-game');
    nextChallenge();
}

function nextChallenge() {
    if(active.deck.length === 0) return finishGame();
    active.cur = active.deck.pop();
    document.getElementById('game-en').innerText = active.cur.en;
    const pool = document.getElementById('game-pool');
    const drop = document.getElementById('game-drop');
    pool.innerHTML = ''; drop.innerHTML = '';
    active.cur.es.split(' ').sort(()=>0.5-Math.random()).forEach(w => {
        const c = document.createElement('div'); c.className = 'word-chip'; c.innerText = w;
        c.onclick = () => (c.parentElement.id === 'game-pool' ? drop : pool).appendChild(c);
        pool.appendChild(c);
    });
}

function checkGame() {
    const guess = Array.from(document.getElementById('game-drop').children).map(c => c.innerText).join(' ');
    if(guess === active.cur.es) { db.xp += 25; updateUI(); nextChallenge(); }
    else alert("ERROR: " + active.cur.es);
}

function finishGame() {
    if(!db.completed.includes(active.mod.id)) {
        db.completed.push(active.mod.id);
        if(active.mod.id === db.unlocked) db.unlocked++;
    }
    db.xp += 100;
    saveState(); goHome();
}

/** GLOBAL HELPERS */
function voiceOutText(txt) { const u = new SpeechSynthesisUtterance(txt); u.lang = 'es-MX'; window.speechSynthesis.speak(u); }
function voiceOut() { voiceOutText(active.cur.es); }
function updateUI() {
    document.getElementById('xp-val').innerText = db.xp.toLocaleString();
    document.getElementById('lvl-val').innerText = Math.floor(db.xp / 1000) + 1;
    document.getElementById('done-val').innerText = db.completed.length;
    const p = (db.unlocked / INF_ARCHIVE.length) * 100;
    document.getElementById('bar-fill').style.width = p + "%";
    document.getElementById('pct-val').innerText = Math.round(p) + "%";
}
function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function goHome() { showScreen('scr-dash'); boot(); saveState(); }
function saveState() { localStorage.setItem('blink_inf_v26', JSON.stringify(db)); }

boot();
</script>
</body>
</html>
