<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLINK TITAN | THE 1000-HOUR MASTER OS</title>
    <style>
        :root {
            --bg: #020617; 
            --card: #0f172a; 
            --accent: #8b5cf6; 
            --gold: #fbbf24;
            --text: #f8fafc; 
            --green: #10b981; 
            --red: #ef4444; 
            --border: #1e293b;
            --blue: #3b82f6; 
            --glass: rgba(255, 255, 255, 0.03);
            --shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            font-family: 'Inter', -apple-system, system-ui, sans-serif; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
        }

        /* --- UI SCAFFOLDING --- */
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; padding: 25px; overflow-y: auto; }
        .screen.active { display: flex; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .brand { font-size: 28px; font-weight: 950; letter-spacing: -1.5px; }
        .brand span { color: var(--accent); }

        /* --- DASHBOARD COMPONENTS --- */
        .mastery-card { 
            background: linear-gradient(165deg, var(--card) 0%, #1e293b 100%); 
            border-radius: 35px; 
            padding: 30px; 
            border: 1px solid var(--border);
            box-shadow: var(--shadow); 
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }
        
        .mastery-card::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .progress-label { display: flex; justify-content: space-between; font-size: 11px; font-weight: 900; letter-spacing: 2px; opacity: 0.8; text-transform: uppercase; }
        .bar-outer { width: 100%; height: 14px; background: rgba(0,0,0,0.4); border-radius: 7px; margin: 18px 0; overflow: hidden; border: 1px solid var(--border); }
        .bar-inner { height: 100%; background: linear-gradient(90deg, var(--accent), var(--blue)); width: 0%; transition: 1.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .stat-box { background: var(--glass); padding: 15px 5px; border-radius: 22px; text-align: center; border: 1px solid var(--border); backdrop-filter: blur(10px); }
        .stat-val { display: block; font-size: 24px; font-weight: 950; color: var(--gold); }
        .stat-tag { font-size: 9px; text-transform: uppercase; font-weight: 900; opacity: 0.5; letter-spacing: 1px; }

        /* --- PATH ARCHITECTURE --- */
        .path-title { font-size: 12px; font-weight: 900; color: var(--blue); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .path-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }

        .node { 
            background: var(--card); 
            padding: 24px; 
            border-radius: 28px; 
            margin-bottom: 16px;
            border: 1px solid var(--border); 
            display: flex; 
            align-items: center; 
            cursor: pointer; 
            transition: all 0.3s ease;
            position: relative;
        }

        .node:active { transform: scale(0.97); }
        .node.locked { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; border-style: dashed; }
        .node.done { border-color: var(--green); background: rgba(16, 185, 129, 0.03); }
        .node.active { border-color: var(--accent); box-shadow: 0 0 20px rgba(139, 92, 246, 0.2); }

        .node-icon { 
            width: 56px; height: 56px; 
            background: var(--glass); 
            border-radius: 18px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 26px; 
            margin-right: 22px;
            border: 1px solid var(--border);
        }
        .node-name { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
        .node-meta { font-size: 10px; font-weight: 900; color: var(--accent); margin-bottom: 4px; text-transform: uppercase; }

        /* --- GAME ENGINE UI --- */
        .nav-game { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .game-header-info { text-align: center; }
        .q-wrap { text-align: center; margin: 20px 0 50px; }
        .q-hint { font-size: 13px; color: var(--accent); font-weight: 900; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 15px; }
        .q-main { font-size: 2.6rem; font-weight: 950; line-height: 1.1; letter-spacing: -1px; }
        .q-sub { font-size: 1.4rem; opacity: 0.4; margin-top: 10px; font-weight: 600; }

        .opt-stack { display: grid; gap: 14px; width: 100%; }
        .opt-btn { 
            background: var(--card); 
            padding: 24px; 
            border-radius: 24px; 
            border: 1px solid var(--border); 
            color: var(--text); 
            font-weight: 800; 
            text-align: left; 
            font-size: 18px; 
            cursor: pointer; 
            transition: 0.2s;
        }
        .opt-btn:hover { background: var(--border); }
        .opt-btn.correct { background: var(--green) !important; border-color: var(--green); color: white; transform: scale(1.02); }
        .opt-btn.wrong { background: var(--red) !important; border-color: var(--red); color: white; animation: shake 0.4s; }

        .drop-zone { 
            min-height: 140px; 
            background: rgba(0,0,0,0.2); 
            border: 2px dashed var(--border); 
            border-radius: 32px; 
            padding: 25px; 
            margin-bottom: 30px; 
            display: flex; 
            flex-wrap: wrap; 
            gap: 12px; 
            justify-content: center; 
            align-items: center; 
        }
        .word-chip { 
            background: var(--accent); 
            padding: 16px 24px; 
            border-radius: 18px; 
            font-weight: 900; 
            color: white; 
            cursor: pointer; 
            box-shadow: 0 5px 0 #6d28d9; 
            transition: 0.1s; 
            font-size: 17px;
        }
        .word-chip:active { transform: translateY(4px); box-shadow: 0 1px 0 #6d28d9; }

        /* --- RECAP OVERLAY --- */
        #recap-overlay { 
            position: fixed; 
            inset: 0; 
            background: var(--bg); 
            z-index: 1000; 
            display: none; 
            flex-direction: column; 
            padding: 40px 25px; 
            overflow-y: auto;
        }
        .recap-hero { background: var(--card); border-radius: 35px; padding: 35px; border: 1px solid var(--border); margin-bottom: 25px; text-align: center; }
        .recap-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }
        .recap-item { background: var(--glass); padding: 18px; border-radius: 20px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .recap-es { font-weight: 900; color: var(--accent); font-size: 16px; }
        .recap-en { font-size: 13px; opacity: 0.5; font-weight: 600; }

        .bridge-card { background: linear-gradient(to right, #1e1b4b, #0f172a); padding: 25px; border-radius: 25px; border: 1px solid var(--blue); margin-bottom: 30px; }

        /* --- UI COMPONENTS --- */
        .btn-footer { 
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 25px; 
            border-radius: 25px; 
            font-size: 20px; 
            font-weight: 950; 
            width: 100%; 
            cursor: pointer; 
            box-shadow: 0 15px 40px rgba(139, 92, 246, 0.4); 
            margin-top: auto;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .tab-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .btn-tab { background: var(--card); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 15px; font-size: 11px; font-weight: 900; cursor: pointer; text-transform: uppercase; opacity: 0.6; }
        .btn-tab.active { background: var(--accent); border-color: var(--accent); opacity: 1; box-shadow: 0 5px 15px rgba(139, 92, 246, 0.3); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>

/**
 * CORE STATE MACHINE
 */
let state = JSON.parse(localStorage.getItem('titan_mastery_v17')) || {
    xp: 0, 
    mins: 0, 
    unlocked: 0, 
    streak: 0, 
    lastDate: null, 
    completed: []
};

let active = { 
    mod: null, 
    deck: [], 
    cur: null, 
    count: 0, 
    total: 0, 
    errors: 0, 
    startTime: null 
};

// INITIALIZATION
function init() {
    updateDashboard();
    renderPath();
    processStreak();
}

function processStreak() {
    const today = new Date().toDateString();
    if(state.lastDate !== today) {
        const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
        if(state.lastDate === yesterday.toDateString()) state.streak++;
        else if(state.lastDate) state.streak = 1;
        state.lastDate = today;
        save();
    }
}

// DASHBOARD LOGIC
function renderPath() {
    const container = document.getElementById('path-container');
    container.innerHTML = '<div class="path-title">Knowledge Trajectory</div>';
    
    CURRICULUM.forEach((m, idx) => {
        const isUnlocked = idx <= state.unlocked;
        const isDone = state.completed.includes(m.id);
        const nodeClass = isDone ? 'done' : (isUnlocked ? 'active' : 'locked');

        const div = document.createElement('div');
        div.className = `node ${nodeClass}`;
        div.onclick = () => { if(isUnlocked) launchModule(m); };
        
        div.innerHTML = `
            <div class="node-icon">${!isUnlocked ? '🔒' : m.icon}</div>
            <div style="flex:1">
                <div class="node-meta">${m.lvl} • ${isDone ? 'Conquered' : (isUnlocked ? 'Available' : 'Locked')}</div>
                <div class="node-name">${m.topic}</div>
            </div>
            ${isDone ? '<div style="color:var(--green); font-size:24px;">✓</div>' : ''}
        `;
        container.appendChild(div);
    });
}

function switchTab(type) {
    const tabs = document.querySelectorAll('.btn-tab');
    tabs.forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    
    const container = document.getElementById('path-container');
    if(type === 'path') renderPath();
    else if(type === 'verbs') container.innerHTML = '<p style="padding:40px; text-align:center; opacity:0.5;">Verb Engine Warming Up...</p>';
    else container.innerHTML = '<p style="padding:40px; text-align:center; opacity:0.5;">Glossary Indexing...</p>';
}

    active = { 
        mod: m, 
        deck: [...m.data].sort(() => 0.5 - Math.random()), 
        count: 0, 
        total: m.data.length, 
        errors: 0,
        startTime: Date.now()
    };
    
    document.getElementById('mod-tag').innerText = `LEVEL ${m.lvl} • ${m.topic}`;
    showScreen('scr-game');
    generateDots();
    nextQuestion();
}

function nextQuestion() {
    if(active.deck.length === 0) return finalizeSession();
    active.cur = active.deck.pop();
    active.count++;
    updateDots();
    renderQuestion();
}

function renderQuestion() {
    const canvas = document.getElementById('game-canvas');
    const controls = document.getElementById('game-controls');
    canvas.innerHTML = ''; controls.innerHTML = '';

    // Logic: Alternate between Scramble and Multiple Choice
    const type = Math.random() > 0.4 ? 'scramble' : 'choice';

    if(type === 'scramble') {
        canvas.innerHTML = `
            <div class="q-wrap">
                <div class="q-hint">Translate to Spanish</div>
                <div class="q-sub">${active.cur.en}</div>
            </div>
            <div class="drop-zone" id="drop-area"></div>
            <div id="word-pool" style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center;"></div>
        `;
        
        const words = active.cur.es.split(' ').sort(() => 0.5 - Math.random());
        words.forEach(w => {
            const chip = document.createElement('div');
            chip.className = 'word-chip';
            chip.innerText = w;
            chip.onclick = () => {
                const target = chip.parentElement.id === 'word-pool' ? document.getElementById('drop-area') : document.getElementById('word-pool');
                target.appendChild(chip);
            };
            document.getElementById('word-pool').appendChild(chip);
        });
        
        controls.innerHTML = `<button class="btn-footer" onclick="validateScramble()">Validate Token</button>`;
    } else {
        canvas.innerHTML = `
            <div class="q-wrap">
                <div class="q-hint">Target Identification</div>
                <div class="q-main">${active.cur.es}</div>
            </div>
            <div class="opt-stack" id="opt-mount"></div>
        `;
        
        const choices = [active.cur.en, "Incorrect Context", "Wrong Translation", "Invalid Matching"].sort(() => 0.5 - Math.random());
        choices.forEach(c => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = c;
            btn.onclick = () => {
                if(c === active.cur.en) {
                    btn.classList.add('correct');
                    state.xp += 15;
                    setTimeout(nextQuestion, 600);
                } else {
                    btn.classList.add('wrong');
                    active.errors++;
                }
            };
            document.getElementById('opt-mount').appendChild(btn);
        });
    }
}

function validateScramble() {
    const guess = Array.from(document.getElementById('drop-area').children).map(c => c.innerText).join(' ');
    if(guess === active.cur.es) {
        state.xp += 25;
        nextQuestion();
    } else {
        active.errors++;
        alert(`Neural Correction: ${active.cur.es}`);
        nextQuestion();
    }
}

// FINALIZE & RECAP BRIDGE
function finalizeSession() {
    const overlay = document.getElementById('recap-overlay');
    const list = document.getElementById('recap-list');
    
    overlay.style.display = 'flex';
    document.getElementById('recap-title').innerText = active.mod.topic;
    document.getElementById('recap-performance').innerText = `${active.total}/${active.total} Tokens processed with ${active.errors} corrections.`;
    
    // Fill Recap List
    list.innerHTML = active.mod.data.map(d => `
        <div class="recap-item">
            <span class="recap-es">${d.es}</span>
            <span class="recap-en">${d.en}</span>
        </div>
    `).join('');

    // Bridge Logic
    const nextMod = CURRICULUM[active.mod.id + 1];
    if(nextMod) {
        document.getElementById('bridge-next-lvl').innerText = `Next: ${nextMod.topic}`;
    } else {
        document.getElementById('bridge-next-lvl').innerText = `Trajectory Complete`;
    }

    document.getElementById('btn-recap-finish').onclick = () => {
        // Unlock Logic
        if(!state.completed.includes(active.mod.id)) {
            state.completed.push(active.mod.id);
            if(active.mod.id === state.unlocked) state.unlocked++;
        }
        
        // Stats
        const sessionMins = Math.floor((Date.now() - active.startTime) / 60000);
        state.mins += Math.max(sessionMins, 2);
        
        save();
        overlay.style.display = 'none';
        quitGame();
    };
}

// UTILS
function updateDashboard() {
    document.getElementById('disp-xp').innerText = state.xp.toLocaleString();
    document.getElementById('disp-min').innerText = state.mins;
    document.getElementById('disp-streak').innerText = `🔥 ${state.streak}`;
    
    const pct = (state.unlocked / CURRICULUM.length) * 100;
    document.getElementById('disp-pct').innerText = pct.toFixed(1) + "%";
    document.getElementById('bar-main').style.width = pct + "%";
    
    let rank = "RECRUIT";
    if(state.xp > 500) rank = "PAISA";
    if(state.xp > 2000) rank = "VETERAN";
    if(state.xp > 5000) rank = "TITAN";
    document.getElementById('disp-rank').innerText = rank;
}

function quitGame() {
    showScreen('scr-dash');
    init();
}

function save() { localStorage.setItem('titan_mastery_v17', JSON.stringify(state)); }

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function triggerAudio() {
    if(!active.cur) return;
    const utterance = new SpeechSynthesisUtterance(active.cur.es);
    utterance.lang = 'es-MX';
    utterance.rate = 0.9;
    window.speechSynthesis.speak(utterance);
}

function generateDots() {
    const mount = document.getElementById('game-dots');
    mount.innerHTML = '';
    for(let i=0; i<active.total; i++) {
        const dot = document.createElement('div');
        dot.style.cssText = 'width:6px; height:6px; border-radius:50%; background: var(--border); transition: 0.3s;';
        mount.appendChild(dot);
    }
}

function updateDots() {
    const dots = document.getElementById('game-dots').children;
    if(dots[active.count - 1]) dots[active.count - 1].style.background = 'var(--accent)';
}

// RUN
init();
</script>
