<html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLINK TITAN | THE 800+ LINE MONOLITH</title>
    <style>
        :root {
            --bg: #020617; 
            --card: #0f172a; 
            --accent: #8b5cf6; 
            --gold: #fbbf24;
            --text: #f8fafc; 
            --green: #10b981; 
            --red: #ef4444; 
            --border: #1e293b;
            --blue: #3b82f6; 
            --glass: rgba(255, 255, 255, 0.03);
            --shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: var(--bg); color: var(--text); margin: 0; 
            font-family: 'Inter', -apple-system, system-ui, sans-serif; 
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* --- SCREEN MANAGEMENT --- */
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; padding: 25px; overflow-y: auto; }
        .screen.active { display: flex; animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* --- DASHBOARD UI --- */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .brand { font-size: 28px; font-weight: 950; letter-spacing: -1.5px; }
        .brand span { color: var(--accent); }

        .mastery-card { 
            background: linear-gradient(165deg, var(--card) 0%, #1e293b 100%); 
            border-radius: 35px; padding: 30px; border: 1px solid var(--border);
            box-shadow: var(--shadow); margin-bottom: 30px; position: relative; overflow: hidden;
        }
        
        .progress-label { display: flex; justify-content: space-between; font-size: 11px; font-weight: 900; letter-spacing: 2px; opacity: 0.8; text-transform: uppercase; }
        .bar-outer { width: 100%; height: 14px; background: rgba(0,0,0,0.4); border-radius: 7px; margin: 18px 0; overflow: hidden; border: 1px solid var(--border); }
        .bar-inner { height: 100%; background: linear-gradient(90deg, var(--accent), var(--blue)); width: 0%; transition: 1.8s ease; }
        
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .stat-box { background: var(--glass); padding: 15px 5px; border-radius: 22px; text-align: center; border: 1px solid var(--border); }
        .stat-val { display: block; font-size: 24px; font-weight: 950; color: var(--gold); }
        .stat-tag { font-size: 9px; text-transform: uppercase; font-weight: 900; opacity: 0.5; letter-spacing: 1px; }

        /* --- NAVIGATION TABS --- */
        .nav-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: var(--card); border: 1px solid var(--border); color: white; padding: 15px; border-radius: 20px; font-size: 12px; font-weight: 900; cursor: pointer; text-align: center; transition: 0.3s; }
        .tab-btn.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3); }

        /* --- NODE PATH --- */
        .node { 
            background: var(--card); padding: 24px; border-radius: 28px; margin-bottom: 16px;
            border: 1px solid var(--border); display: flex; align-items: center; cursor: pointer; transition: 0.3s;
        }
        .node.locked { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; border-style: dashed; }
        .node-icon { width: 56px; height: 56px; background: var(--glass); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 26px; margin-right: 22px; border: 1px solid var(--border); }
        .node-name { font-size: 20px; font-weight: 800; }

        /* --- GAME ENGINE UI --- */
        .nav-game { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .q-wrap { text-align: center; margin: 20px 0 50px; }
        .q-hint { font-size: 13px; color: var(--accent); font-weight: 900; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px; }
        .q-main { font-size: 2.5rem; font-weight: 950; line-height: 1.1; }

        .drop-zone { min-height: 130px; background: rgba(0,0,0,0.2); border: 2px dashed var(--border); border-radius: 32px; padding: 25px; margin-bottom: 30px; display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; align-items: center; }
        .word-chip { background: var(--accent); padding: 16px 24px; border-radius: 18px; font-weight: 900; color: white; cursor: pointer; box-shadow: 0 5px 0 #6d28d9; }

        /* --- FLASHCARD ENGINE --- */
        .fcard-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; perspective: 1200px; }
        .fcard { width: 100%; max-width: 340px; height: 450px; position: relative; transform-style: preserve-3d; transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .fcard.flipped { transform: rotateY(180deg); }
        .fcard-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .fcard-front { background: var(--card); }
        .fcard-back { background: linear-gradient(135deg, var(--accent), var(--blue)); transform: rotateY(180deg); color: white; }

        /* --- NEURAL CORRECTION OVERLAY --- */
        #neural-overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98); z-index: 5000; display: none; flex-direction: column; padding: 40px 25px; }
        .correction-card { background: var(--card); border-radius: 35px; padding: 35px; border: 1px solid var(--red); margin-bottom: 25px; }
        .correction-title { color: var(--red); font-weight: 900; letter-spacing: 2px; font-size: 14px; margin-bottom: 20px; text-transform: uppercase; }
        .diff-box { margin-bottom: 20px; }
        .diff-label { font-size: 10px; font-weight: 900; opacity: 0.5; margin-bottom: 5px; text-transform: uppercase; }
        .diff-text { font-size: 20px; font-weight: 800; }

        /* --- RECAP ENGINE --- */
        #recap-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 4000; display: none; flex-direction: column; padding: 40px 25px; overflow-y: auto; }
        .recap-item { background: var(--glass); padding: 20px; border-radius: 20px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }

        .btn-footer { background: var(--accent); color: white; border: none; padding: 25px; border-radius: 25px; font-size: 18px; font-weight: 950; width: 100%; cursor: pointer; box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4); text-transform: uppercase; }
        
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>

            </div>
        </div>
    </div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:40px;">
        <button class="tab-btn" onclick="navCard(-1)">PREVIOUS</button>
        <button class="tab-btn" onclick="navCard(1)">NEXT</button>
    </div>
</div>

<div id="neural-overlay">
    <div class="correction-card">
        <div class="correction-title">Neural Correction Required</div>
        <div class="diff-box">

    <div id="diff-analysis" style="font-size:16px; line-height:1.6; opacity:0.8; margin-bottom:40px;"></div>
    <button class="btn-footer" onclick="closeCorrection()">Acknowledge & Sync</button>

<div id="recap-overlay">
    <h1 style="font-size:36px; font-weight:950; margin:0 0 10px;">DOMAIN SECURED</h1>
    <p id="recap-stats" style="opacity:0.6; margin-bottom:30px;"></p>

    { id: 8, lvl: "B2.2", icon: "📊", topic: "Global Economy", data: [
        {es:"La inflación subió", en:"Inflation rose"}, {es:"Invertir en bolsa", en:"Invest in the stock market"}, {es:"Crecimiento económico", en:"Economic growth"},
        {es:"Tasa de desempleo", en:"Unemployment rate"}, {es:"Deuda externa alta", en:"High external debt"}, {es:"Exportar muchos productos", en:"To export many products"},
        {es:"Análisis financiero real", en:"Real financial analysis"}, {es:"Ganancias netas bajas", en:"Low net profits"}, {es:"Crisis de divisas fuerte", en:"Strong currency crisis"},
        {es:"Presupuesto anual listo", en:"Annual budget ready"}, {es:"Impuestos muy altos", en:"Very high taxes"}, {es:"El mercado global cae", en:"The global market falls"},

/**
 * ENGINE STATE
 */
let state = JSON.parse(localStorage.getItem('titan_monolith_v20')) || {
    xp: 0, mins: 0, unlocked: 0, completed: [], streak: 0, lastDate: null
};

let active = {
    mode: 'path', mod: null, deck: [], cur: null, count: 0, total: 0, errors: 0, cardIdx: 0, startTime: null
};

// INITIALIZATION
function init() {
    updateDashboard();
    renderPath();
    processStreak();
}

function processStreak() {
    const now = new Date().toDateString();
    if(state.lastDate !== now) {
        state.streak++;
        state.lastDate = now;
        save();
    }
}

function switchMode(m) {
    active.mode = m;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + (m === 'path' ? 'path' : 'study')).classList.add('active');
    renderPath();
}

/**
 * DASHBOARD RENDERING
 */
function renderPath() {
    const mount = document.getElementById('path-list');
    mount.innerHTML = '';
    
    CURRICULUM.forEach((m, idx) => {
        const isUnlocked = idx <= state.unlocked;
        const isDone = state.completed.includes(m.id);
        
        const node = document.createElement('div');
        node.className = `node ${!isUnlocked ? 'locked' : ''}`;
        node.onclick = () => {
            if(!isUnlocked) return;
            active.mode === 'path' ? launchGame(m) : launchFlashcards(m);
        };
        
        node.innerHTML = `
            <div class="node-icon">${!isUnlocked ? '🔒' : m.icon}</div>
            <div style="flex:1">
                <div style="font-size:10px; font-weight:900; color:var(--accent); text-transform:uppercase;">Level ${m.lvl}</div>
                <div class="node-name">${m.topic}</div>
            </div>
            ${isDone ? '<div style="color:var(--green); font-size:24px;">✓</div>' : ''}
        `;
        mount.appendChild(node);
    });
}

/**
 * GAME ENGINE CORE
 */
function launchGame(m) {
    active = { 
        ...active, mod: m, deck: [...m.data].sort(() => 0.5 - Math.random()), 
        count: 0, total: m.data.length, errors: 0, startTime: Date.now() 
    };
    document.getElementById('game-title').innerText = m.topic;
    showScreen('scr-game');
    genDots();
    nextQuestion();
}

function nextQuestion() {
    if(active.deck.length === 0) return finalizeGame();
    active.cur = active.deck.pop();
    active.count++;
    updateDots();
    renderQuestion();
}

function renderQuestion() {
    const mount = document.getElementById('game-mount');
    const controls = document.getElementById('game-controls');
    mount.innerHTML = ''; controls.innerHTML = '';

    mount.innerHTML = `
        <div class="q-wrap">
            <div class="q-hint">Translate to Spanish</div>
            <div class="q-main" style="font-size: 1.6rem; opacity:0.5;">${active.cur.en}</div>
        </div>
        <div class="drop-zone" id="drop-box"></div>
        <div id="word-pool" style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center;"></div>
    `;

    const pool = active.cur.es.split(' ').sort(() => 0.5 - Math.random());
    pool.forEach(w => {
        const chip = document.createElement('div');
        chip.className = 'word-chip';
        chip.innerText = w;
        chip.onclick = () => {
            const target = chip.parentElement.id === 'word-pool' ? document.getElementById('drop-box') : document.getElementById('word-pool');
            target.appendChild(chip);
        };
        document.getElementById('word-pool').appendChild(chip);
    });

    controls.innerHTML = `<button class="btn-footer" onclick="validateScramble()">Submit Translation</button>`;
}

function validateScramble() {
    const userGuess = Array.from(document.getElementById('drop-box').children).map(c => c.innerText).join(' ');
    if(userGuess === active.cur.es) {
        state.xp += 25;
        nextQuestion();
    } else {
        showNeuralCorrection(userGuess, active.cur.es);
    }
}

/**
 * NEURAL CORRECTION ENGINE
 */
function showNeuralCorrection(guess, target) {
    document.getElementById('diff-user').innerText = guess || "[No Input]";
    document.getElementById('diff-target').innerText = target;
    
    let analysis = "";
    const gWords = guess.split(' ');
    const tWords = target.split(' ');

    if(gWords.length !== tWords.length) {
        analysis = `Word count mismatch. Target requires <b>${tWords.length}</b> words, you provided <b>${gWords.length}</b>. Check for missing articles or pronouns.`;
    } else {
        analysis = "Vocabulary is present but the <b>syntax (word order)</b> is incorrect. In Spanish, word order often determines the emphasis and clarity of the 'Being' vs 'Doing'.";
    }

    document.getElementById('diff-analysis').innerHTML = analysis;
    document.getElementById('neural-overlay').style.display = 'flex';
}

function closeCorrection() {
    document.getElementById('neural-overlay').style.display = 'none';
    active.errors++;
    nextQuestion();
}

/**
 * FLASHCARD ENGINE
 */
function launchFlashcards(m) {
    active.mod = m;
    active.cardIdx = 0;
    showScreen('scr-cards');
    renderCard();
}

function renderCard() {
    const item = active.mod.data[active.cardIdx];
    document.getElementById('fcard-obj').classList.remove('flipped');
    document.getElementById('f-en').innerText = item.en;
    document.getElementById('f-es').innerText = item.es;
    document.getElementById('card-count').innerText = `${active.cardIdx + 1} / ${active.mod.data.length}`;
}

function navCard(dir) {
    active.cardIdx = (active.cardIdx + dir + active.mod.data.length) % active.mod.data.length;
    renderCard();
}

/**
 * FINALIZE & RECAP
 */
function finalizeGame() {
    const over = document.getElementById('recap-overlay');
    over.style.display = 'flex';
    document.getElementById('recap-stats').innerText = `${active.total} linguistic tokens processed with ${active.errors} corrections.`;
    
    const list = document.getElementById('recap-list');
    list.innerHTML = active.mod.data.map(d => `
        <div class="recap-item">
            <div>
                <div style="font-weight:900; color:var(--accent);">${d.es}</div>
                <div style="font-size:12px; opacity:0.5;">${d.en}</div>
            </div>
        </div>
    `).join('');

    document.getElementById('btn-recap-next').onclick = () => {
        if(!state.completed.includes(active.mod.id)) {
            state.completed.push(active.mod.id);
            if(active.mod.id === state.unlocked) state.unlocked++;
        }
        const sessionMins = Math.floor((Date.now() - active.startTime) / 60000);
        state.mins += Math.max(sessionMins, 3);
        save();
        over.style.display = 'none';
        quitGame();
    };
}

/**
 * UTILS
 */
function updateDashboard() {
    document.getElementById('disp-xp').innerText = state.xp.toLocaleString();
    document.getElementById('disp-min').innerText = state.mins;
    document.getElementById('disp-streak').innerText = `🔥 ${state.streak}`;
    const p = (state.unlocked / CURRICULUM.length) * 100;
    document.getElementById('disp-pct').innerText = p.toFixed(1) + "%";
    document.getElementById('bar-main').style.width = p + "%";
    
    let rank = "RECRUIT";
    if(state.xp > 1000) rank = "ADEPT";
    if(state.xp > 5000) rank = "TITAN";
    document.getElementById('disp-rank').innerText = rank;
}

function quitGame() { showScreen('scr-dash'); init(); }
function save() { localStorage.setItem('titan_monolith_v20', JSON.stringify(state)); }
function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function speakCurrent() {
    const u = new SpeechSynthesisUtterance(active.cur.es);
    u.lang = 'es-MX'; u.rate = 0.8;
    window.speechSynthesis.speak(u);
}
function genDots() {
    const m = document.getElementById('game-dots'); m.innerHTML = '';
    for(let i=0; i<active.total; i++) m.innerHTML += `<div style="width:4px; height:4px; border-radius:50%; background:var(--border);"></div>`;
}
function updateDots() {
    const dots = document.getElementById('game-dots').children;
    if(dots[active.count-1]) dots[active.count-1].style.background = 'var(--accent)';
}

// BOOT
init();
</script>
</body>
</html>
