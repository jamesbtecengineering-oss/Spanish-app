<html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLINK TITAN | THE SINGULARITY v22.0</title>
    <style>
        :root {
            --bg: #020617; --card: #0f172a; --accent: #8b5cf6; --gold: #fbbf24;
            --text: #f8fafc; --green: #10b981; --red: #ef4444; --border: #1e293b;
            --blue: #3b82f6; --glass: rgba(255, 255, 255, 0.05);
            --shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: var(--bg); color: var(--text); margin: 0; 
            font-family: 'Inter', -apple-system, system-ui, sans-serif; 
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* --- NAVIGATION & SCREENS --- */
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; padding: 25px; overflow-y: auto; }
        .screen.active { display: flex; animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* --- DASHBOARD UI --- */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .brand { font-size: 28px; font-weight: 950; letter-spacing: -1.5px; }
        .brand span { color: var(--accent); }

        .mastery-card { 
            background: linear-gradient(165deg, var(--card) 0%, #1e293b 100%); 
            border-radius: 35px; padding: 30px; border: 1px solid var(--border);
            box-shadow: var(--shadow); margin-bottom: 30px; position: relative; overflow: hidden;
        }
        
        .progress-label { display: flex; justify-content: space-between; font-size: 11px; font-weight: 900; letter-spacing: 2px; opacity: 0.8; text-transform: uppercase; }
        .bar-outer { width: 100%; height: 14px; background: rgba(0,0,0,0.4); border-radius: 7px; margin: 18px 0; overflow: hidden; border: 1px solid var(--border); }
        .bar-inner { height: 100%; background: linear-gradient(90deg, var(--accent), var(--blue)); width: 0%; transition: 1.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .stat-box { background: var(--glass); padding: 15px 5px; border-radius: 22px; text-align: center; border: 1px solid var(--border); backdrop-filter: blur(10px); }
        .stat-val { display: block; font-size: 24px; font-weight: 950; color: var(--gold); }
        .stat-tag { font-size: 9px; text-transform: uppercase; font-weight: 900; opacity: 0.5; letter-spacing: 1px; }

        /* --- TABS --- */
        .nav-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .tab-btn { background: var(--card); border: 1px solid var(--border); color: white; padding: 18px; border-radius: 20px; font-size: 12px; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3); }

        /* --- NODE PATH --- */
        .node { 
            background: var(--card); padding: 24px; border-radius: 28px; margin-bottom: 16px;
            border: 1px solid var(--border); display: flex; align-items: center; cursor: pointer; transition: 0.3s;
        }
        .node.locked { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; border-style: dashed; }
        .node-icon { width: 56px; height: 56px; background: var(--glass); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 26px; margin-right: 22px; border: 1px solid var(--border); }
        .node-name { font-size: 20px; font-weight: 800; }

        /* --- GAME ENGINE UI --- */
        .nav-game { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .q-wrap { text-align: center; margin: 20px 0 40px; }
        .q-hint { font-size: 13px; color: var(--accent); font-weight: 900; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px; }
        .q-main { font-size: 2rem; font-weight: 950; line-height: 1.1; }

        .drop-zone { min-height: 140px; background: rgba(0,0,0,0.2); border: 2px dashed var(--border); border-radius: 32px; padding: 25px; margin-bottom: 30px; display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; align-items: center; }
        .word-chip { background: var(--accent); padding: 16px 24px; border-radius: 18px; font-weight: 900; color: white; cursor: pointer; box-shadow: 0 5px 0 #6d28d9; transition: 0.1s; }
        .word-chip:active { transform: translateY(3px); box-shadow: 0 2px 0 #6d28d9; }

        /* --- FLASHCARD ENGINE --- */
        .fcard-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; perspective: 1200px; }
        .fcard { width: 100%; max-width: 340px; height: 450px; position: relative; transform-style: preserve-3d; transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .fcard.flipped { transform: rotateY(180deg); }
        .fcard-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .fcard-front { background: var(--card); }
        .fcard-back { background: linear-gradient(135deg, var(--accent), var(--blue)); transform: rotateY(180deg); color: white; }

        /* --- NEURAL CORRECTION OVERLAY --- */
        #neural-overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98); z-index: 5000; display: none; flex-direction: column; padding: 40px 25px; justify-content: center; }
        .correction-card { background: var(--card); border-radius: 35px; padding: 35px; border: 1px solid var(--red); margin-bottom: 25px; }
        .correction-title { color: var(--red); font-weight: 900; letter-spacing: 2px; font-size: 14px; margin-bottom: 20px; text-transform: uppercase; }
        .diff-text { font-size: 22px; font-weight: 800; margin-bottom: 20px; }

        .btn-footer { background: var(--accent); color: white; border: none; padding: 25px; border-radius: 25px; font-size: 18px; font-weight: 950; width: 100%; cursor: pointer; box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4); text-transform: uppercase; }
        
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>

            </div>

                <div id="study-text-es" style="font-size:26px; font-weight:900;">...</div>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:40px;">

            <div class="stat-tag" style="margin-bottom:5px;">Correct Syntax</div>

    { id: 8, lvl: "B2.2", icon: "📈", topic: "Global Economy", data: [

        {es:"Tasa de desempleo", en:"Unemployment rate"}, {es:"Deuda externa alta", en:"High external debt"}, {es:"Exportar muchos productos", en:"To export many products"},
        {es:"Análisis financiero real", en:"Real financial analysis"}, {es:"Ganancias netas bajas", en:"Low net profits"}, {es:"Crisis de divisas fuerte", en:"Strong currency crisis"},

];

/**
 * PERSISTENT STATE ENGINE
 */
let state = JSON.parse(localStorage.getItem('titan_singularity_v22')) || {
    xp: 0, mins: 0, unlocked: 0, completed: [], streak: 0, lastDate: null
};

let session = {
    dashMode: 'path', mod: null, deck: [], cur: null, idx: 0, errors: 0, startTime: null
};

// BOOT
function boot() {
    refreshUI();
    renderDashboardList();
    syncStreak();
}

function syncStreak() {
    const today = new Date().toDateString();
    if(state.lastDate !== today) {
        state.streak++;
        state.lastDate = today;
        saveState();
    }
}

function setDashboardMode(m) {
    session.dashMode = m;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`btn-tab-${m}`).classList.add('active');
    renderDashboardList();
}

/**
 * DASHBOARD LOGIC
 */
function renderDashboardList() {
    const container = document.getElementById('path-list');
    container.innerHTML = '';
    
    CURRICULUM.forEach((mod, i) => {
        const isUnlocked = i <= state.unlocked;
        const isDone = state.completed.includes(mod.id);
        const el = document.createElement('div');
        el.className = `node ${isUnlocked ? '' : 'locked'}`;
        el.onclick = () => {
            if(!isUnlocked) return;
            session.dashMode === 'path' ? launchGame(mod) : launchStudy(mod);
        };
        el.innerHTML = `
            <div class="node-icon">${isUnlocked ? mod.icon : '🔒'}</div>
            <div style="flex:1">
                <div class="stat-tag" style="color:var(--accent);">${mod.lvl}</div>
                <div class="node-name">${mod.topic}</div>
            </div>
            ${isDone ? '<div style="color:var(--green); font-size:24px;">✓</div>' : ''}
        `;
        container.appendChild(el);
    });
}

/**
 * GAME ENGINE
 */
function launchGame(mod) {
    session.mod = mod;
    session.deck = [...mod.data].sort(() => 0.5 - Math.random());
    session.idx = 0;
    session.errors = 0;
    session.startTime = Date.now();
    document.getElementById('game-mod-title').innerText = mod.topic;
    showScreen('scr-game');
    initDots();
    nextGameStep();
}

function nextGameStep() {
    if(session.deck.length === 0) return finishGame();
    session.cur = session.deck.pop();
    session.idx++;
    updateDotsUI();
    
    document.getElementById('q-text-en').innerText = session.cur.en;
    const pool = document.getElementById('game-word-pool');
    const drop = document.getElementById('game-drop-zone');
    pool.innerHTML = ''; drop.innerHTML = '';
    
    session.cur.es.split(' ').sort(() => 0.5 - Math.random()).forEach(word => {
        const chip = document.createElement('div');
        chip.className = 'word-chip';
        chip.innerText = word;
        chip.onclick = () => (chip.parentElement.id === 'game-word-pool' ? drop : pool).appendChild(chip);
        pool.appendChild(chip);
    });
}

function evaluateGameStep() {
    const guess = Array.from(document.getElementById('game-drop-zone').children).map(c => c.innerText).join(' ');
    if(guess === session.cur.es) {
        state.xp += 25;
        nextGameStep();
    } else {
        openNeuralFeedback(guess, session.cur.es);
    }
}

function openNeuralFeedback(guess, target) {
    document.getElementById('fb-user-text').innerText = guess || "[No Input Detected]";
    document.getElementById('fb-target-text').innerText = target;
    
    let analysis = "Linguistic mismatch identified. ";
    const userWords = guess.split(' ');
    const targetWords = target.split(' ');

    if(userWords.length !== targetWords.length) {
        analysis += `The target requires <b>${targetWords.length}</b> tokens, you provided <b>${userWords.length}</b>. Check for missing connectors or articles.`;
    } else {
        analysis += `You have the correct lexicon, but the <b>syntax</b> (order) is invalid for Spanish. Remember: Adjectives usually follow the noun in this context.`;
    }

    document.getElementById('fb-analysis-text').innerHTML = analysis;
    document.getElementById('neural-overlay').style.display = 'flex';
}

function closeNeuralFeedback() {
    document.getElementById('neural-overlay').style.display = 'none';
    session.errors++;
    nextGameStep();
}

/**
 * STUDY ENGINE (FLASHCARDS)
 */
function launchStudy(mod) {
    session.mod = mod;
    session.idx = 0;
    showScreen('scr-study');
    renderStudyCard();
}

function renderStudyCard() {
    const pair = session.mod.data[session.idx];
    document.getElementById('study-card-obj').classList.remove('flipped');
    document.getElementById('study-text-en').innerText = pair.en;
    document.getElementById('study-text-es').innerText = pair.es;
    document.getElementById('study-progress-tag').innerText = `${session.idx + 1} / ${session.mod.data.length}`;
}

function cycleCard(dir) {
    session.idx = (session.idx + dir + session.mod.data.length) % session.mod.data.length;
    renderStudyCard();
}

/**
 * SYSTEM UTILS
 */
function finishGame() {
    if(!state.completed.includes(session.mod.id)) {
        state.completed.push(session.mod.id);
        if(session.mod.id === state.unlocked) state.unlocked++;
    }
    const elapsed = Math.floor((Date.now() - session.startTime) / 60000);
    state.mins += Math.max(elapsed, 2);
    state.xp += 100;
    saveState();
    exitToHome();
}

function refreshUI() {
    document.getElementById('disp-xp').innerText = state.xp.toLocaleString();
    document.getElementById('disp-min').innerText = state.mins;
    document.getElementById('disp-streak').innerText = `🔥 ${state.streak}`;
    const p = (state.unlocked / CURRICULUM.length) * 100;
    document.getElementById('disp-pct').innerText = p.toFixed(1) + "%";
    document.getElementById('bar-main').style.width = p + "%";
    
    let rank = "RECRUIT";
    if(state.xp > 2000) rank = "ELITE";
    if(state.xp > 8000) rank = "TITAN";
    document.getElementById('disp-rank').innerText = rank;
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function exitToHome() { showScreen('scr-dash'); boot(); }
function saveState() { localStorage.setItem('titan_singularity_v22', JSON.stringify(state)); }

function initDots() {
    const m = document.getElementById('game-dots'); m.innerHTML = '';
    for(let i=0; i<session.mod.data.length; i++) {
        const d = document.createElement('div');
        d.style.cssText = 'width:5px; height:5px; border-radius:50%; background:var(--border);';
        m.appendChild(d);
    }
}

function updateDotsUI() {
    const dots = document.getElementById('game-dots').children;
    if(dots[session.idx-1]) dots[session.idx-1].style.background = 'var(--accent)';
}

function speakInput() {
    const u = new SpeechSynthesisUtterance(session.cur.es);
    u.lang = 'es-MX'; u.rate = 0.85;
    window.speechSynthesis.speak(u);
}

// LAUNCH
boot();
</script>
</body>
</html>
