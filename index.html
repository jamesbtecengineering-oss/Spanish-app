<html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blink Elite: 100-Hour Legend</title>
    <style>
        :root { --p-gold: #fbbf24; --p-blue: #3b82f6; --p-green: #10b981; --p-bg: #020617; --p-card: #1e293b; --p-text: #f8fafc; --p-accent: #8b5cf6; }
        .theme-medellin { --p-bg: #0f172a; --p-accent: #10b981; }
        .theme-cyber { --p-bg: #000; --p-accent: #06b6d4; --p-card: #111; }

        * { box-sizing: border-box; -webkit-user-select: none; touch-action: manipulation; font-family: 'Inter', sans-serif; transition: 0.3s; }
        body { background: var(--p-bg); color: var(--p-text); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; padding: 25px; overflow-y: auto; }
        .active { display: flex; }

        /* 100-Hour Progress Tracker */
        .progress-circle { width: 100%; background: var(--p-card); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .bar-bg { width: 100%; height: 12px; background: #0f172a; border-radius: 6px; margin-top: 10px; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, var(--p-accent), var(--p-blue)); width: 0%; transition: 1s ease-out; }

        /* Navigation Tiles */
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .tile { background: var(--p-card); padding: 20px; border-radius: 18px; border: 1px solid #334155; text-align: center; }
        .tile-val { display: block; font-size: 20px; font-weight: 900; color: var(--p-gold); }
        .tile-lbl { font-size: 10px; opacity: 0.6; text-transform: uppercase; font-weight: 800; }

        /* Input Styles */
        select, input { width: 100%; padding: 16px; background: var(--p-card); border: 1px solid #334155; border-radius: 12px; color: white; margin-bottom: 12px; outline: none; }
        .btn-hero { width: 100%; padding: 20px; border-radius: 16px; border: none; color: white; font-weight: 800; font-size: 16px; background: var(--p-accent); cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.3); }
        .btn-hero:active { transform: translateY(3px); box-shadow: none; }

        /* Slang Lab */
        .lab-card { background: rgba(139, 92, 246, 0.1); border: 1px dashed var(--p-accent); padding: 15px; border-radius: 12px; margin-top: 20px; }

        /* Game UI */
        .game-area { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .q-text { font-size: 1.8rem; font-weight: 800; margin-bottom: 20px; }
        .opt-grid { display: grid; grid-template-columns: 1fr; gap: 10px; width: 100%; }
        .opt-btn { background: var(--p-card); padding: 18px; border-radius: 14px; border: 1px solid #334155; color: white; font-weight: 600; }
        .drop-box { min-height: 80px; width: 100%; border: 2px dashed #334155; border-radius: 16px; margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 8px; padding: 10px; justify-content: center; }
        .chip { background: var(--p-accent); padding: 10px 14px; border-radius: 8px; font-weight: 700; font-size: 13px; }
    </style>
</head>
<body id="main-body">

<div id="scr-home" class="screen active">
    <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h1 style="margin:0; font-size:26px; color:var(--p-accent);">BLINK ELITE</h1>
        <div id="badge" style="font-size:10px; font-weight:900; border:1px solid var(--p-gold); padding:4px 8px; border-radius:20px; color:var(--p-gold);">RECLUTA</div>
    </header>

    <div class="progress-circle">
        <div style="display:flex; justify-content:space-between; font-size:12px; font-weight:800;">
            <span>TOTAL PROGRESS</span>
            <span id="txt-prog">0 / 100 HRS</span>
        </div>
        <div class="bar-bg"><div id="fill-prog" class="bar-fill"></div></div>
    </div>

    <div class="nav-grid">
        <div class="tile"><span id="val-xp" class="tile-val">0</span><span class="tile-lbl">XP Points</span></div>
        <div class="tile"><span id="val-mins" class="tile-val">0</span><span class="tile-lbl">Mins Done</span></div>
    </div>

    <label class="tile-lbl">Target Level</label>
    <select id="sel-lvl">
        <option value="A1">A1: Medellín Basics</option>
        <option value="B1">B1: Street Talk</option>
        <option value="B2">B2: Local Legend</option>
        <option value="CUSTOM">★ My Custom Slang Lab</option>
    </select>

    <button class="btn-hero" onclick="startFlow()">ENTER FLOW STATE</button>

    <div class="lab-card">
        <div class="tile-lbl" style="color:var(--p-accent); margin-bottom:10px;">Slang Lab: Add New Phrase</div>
        <input type="text" id="lab-es" placeholder="Spanish (e.g. ¡Qué chimba!)">
        <input type="text" id="lab-en" placeholder="English (e.g. That's cool!)">
        <button class="btn-hero" style="padding:10px; font-size:12px;" onclick="addToLab()">SAVE TO MY DECK</button>
    </div>
</div>

<div id="scr-flow" class="screen">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <button onclick="exitFlow()" style="background:none; border:none; color:white; font-size:28px;">✕</button>
        <div id="flow-mode" class="tile-lbl" style="background:var(--p-accent); padding:4px 10px; border-radius:5px; color:white;">FLOW</div>
        <button onclick="tts()" style="background:none; border:none; color:white; font-size:28px;">🔊</button>
    </div>
    <div id="flow-content" class="game-area"></div>
    <div id="flow-footer" style="margin-top:20px;"></div>
</div>

<script>
let userData = {
    name: "User", xp: 0, minutes: 0, 
    customDeck: [],
    levels: {
        "A1": [{es:"¡Qué más, parce!", en:"What's up, friend!"},{es:"Todo bien", en:"All good"}],
        "B1": [{es:"¡Qué nota!", en:"How cool!"},{es:"No me de papaya", en:"Don't give a chance"}],
        "B2": [{es:"Ponerse las pilas", en:"To get moving/sharp"},{es:"Hágale pues", en:"Go for it"}]
    }
};

let currentItem = null, startTime = null, deck = [];

// PERSISTENCE
window.onload = () => {
    const saved = localStorage.getItem('blink100h');
    if(saved) userData = JSON.parse(saved);
    updateUI();
};

function updateUI() {
    document.getElementById('val-xp').innerText = userData.xp;
    document.getElementById('val-mins').innerText = userData.minutes;
    const progressPct = Math.min((userData.minutes / 6000) * 100, 100); // 6000 mins = 100 hours
    document.getElementById('fill-prog').style.width = progressPct + "%";
    document.getElementById('txt-prog').innerText = (userData.minutes/60).toFixed(1) + " / 100 HRS";
    
    const badge = document.getElementById('badge');
    if(userData.minutes > 3000) badge.innerText = "CAPITÁN";
    if(userData.minutes > 5400) badge.innerText = "LEYENDA";
}

function addToLab() {
    const es = document.getElementById('lab-es').value;
    const en = document.getElementById('lab-en').value;
    if(es && en) {
        userData.customDeck.push({es, en});
        document.getElementById('lab-es').value = '';
        document.getElementById('lab-en').value = '';
        save();
        alert("Phrase added to Custom Lab!");
    }
}

function startFlow() {
    const lvl = document.getElementById('sel-lvl').value;
    deck = lvl === "CUSTOM" ? userData.customDeck : userData.levels[lvl];
    if(deck.length < 1) return alert("Add phrases to your lab first!");
    startTime = Date.now();
    show('scr-flow');
    nextTask();
}

function nextTask() {
    userData.xp += 15;
    currentItem = deck[Math.floor(Math.random() * deck.length)];
    const types = ["multi", "scramble", "audio", "flash"];
    renderTask(types[Math.floor(Math.random() * types.length)]);
}

function renderTask(type) {
    const content = document.getElementById('flow-content');
    const footer = document.getElementById('flow-footer');
    content.innerHTML = ''; footer.innerHTML = '';
    document.getElementById('flow-mode').innerText = type.toUpperCase();

    if(type === "flash") {
        content.innerHTML = `<div class="q-text" id="f-txt">${currentItem.es}</div><p style="opacity:0.4">Tap to Flip</p>`;
        content.onclick = () => { document.getElementById('f-txt').innerText = currentItem.en; };
        footer.innerHTML = `<button class="btn-hero" onclick="nextTask()">CONTINUE</button>`;
    } else if(type === "multi") {
        content.innerHTML = `<div class="q-text">${currentItem.es}</div><p class="tile-lbl">Choose Translation</p>`;
        const grid = document.createElement('div'); grid.className = 'opt-grid';
        [currentItem.en, "A coffee please", "Tomorrow morning"].sort(()=>Math.random()-0.5).forEach(o => {
            const b = document.createElement('div'); b.className = 'opt-btn'; b.innerText = o;
            b.onclick = () => { if(o === currentItem.en) nextTask(); else b.style.borderColor = "var(--p-red)"; };
            grid.appendChild(b);
        });
        content.appendChild(grid);
    } else if(type === "scramble") {
        content.innerHTML = `<div class="tile-lbl">Build: ${currentItem.en}</div><div class="drop-box" id="drop"></div><div style="display:flex; flex-wrap:wrap; gap:8px; justify-content:center;" id="pool"></div>`;
        const pool = content.querySelector('#pool');
        currentItem.es.split(' ').sort(()=>Math.random()-0.5).forEach(w => {
            const c = document.createElement('div'); c.className = 'chip'; c.innerText = w;
            c.onclick = () => { (c.parentElement === pool ? content.querySelector('#drop') : pool).appendChild(c); };
            pool.appendChild(c);
        });
        footer.innerHTML = `<button class="btn-hero" onclick="checkS()">VERIFY</button>`;
    } else { // audio
        content.innerHTML = `<div class="q-text">🔊 Listening...</div>`; tts();
        const grid = document.createElement('div'); grid.className = 'opt-grid';
        [currentItem.en, "Wrong one", "Incorrect"].sort(()=>Math.random()-0.5).forEach(o => {
            const b = document.createElement('div'); b.className = 'opt-btn'; b.innerText = o;
            b.onclick = () => { if(o === currentItem.en) nextTask(); else b.style.borderColor = "var(--p-red)"; };
            grid.appendChild(b);
        });
        content.appendChild(grid);
    }
}

function checkS() {
    const guess = Array.from(document.getElementById('drop').children).map(c => c.innerText).join(' ');
    if(guess === currentItem.es) nextTask(); else alert("Oops! Order matters.");
}

function exitFlow() {
    const elapsed = Math.floor((Date.now() - startTime) / 60000);
    userData.minutes += elapsed;
    save();
    location.reload();
}

function save() { localStorage.setItem('blink100h', JSON.stringify(userData)); }
function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function tts() { const u = new SpeechSynthesisUtterance(currentItem.es); u.lang = 'es-MX'; window.speechSynthesis.speak(u); }
</script>
</body>
</html>
